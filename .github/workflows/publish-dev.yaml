name: "[CI] Publish dev builds to PyPI"

# On every push to `main`, build and publish `.devN` wheels of the
# publishable AI-repo packages whose sources actually changed in the
# push range. Skipped entirely when the push is a release-please bot
# merge or the release-cut trailer commit (the tag-based publish in
# ci-publish.yaml handles those).
#
# Version scheme
# ==============
#   Own version:  YYYY.WW.0.dev<commit-count>
#     - YYYY.WW is the next scheduled release cycle, computed by
#       `.github/scripts/compute-calver.sh` (manifest-first, ISO
#       week-fallback).
#     - commit-count is monotonic and unique per push, so every push
#       produces a strictly-newer pre-release version.
#
#   Dep floor:    YYYY.WW.0.dev0
#     - Cross-package AI deps get this floor via
#       `.github/scripts/rewrite-pyproject-for-dev.py`. Any dev wheel
#       published in the current cycle satisfies the floor, so
#       selectively-published wheels remain mutually installable
#       regardless of which packages ran on a given push. Across
#       cycles the floor isolates naturally — `2026.18.x.devN` never
#       satisfies `>=2026.20.0.dev0`.

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.guard.outputs.publish }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          fetch-tags: true

      - name: Skip release-please / release-cut commits
        id: guard
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # We skip dev-publishing a commit when any of the following hold:
          #   1. A per-package release tag already points at HEAD
          #      (e.g. `unique-toolkit-v2026.18.0`) — those are published by
          #      `ci-publish.yaml` via the `release:published` event.
          #   2. The commit message is a release-please merge title
          #      (`chore: release …` / `chore(main): release …`) — these can
          #      fire before the tag is created, so rely on the subject.
          #   3. The commit body carries a `Release-As:` trailer — this is
          #      the `release-cut` prepare commit; nothing to publish yet.
          TAGS=$(git tag --points-at HEAD || true)
          echo "Tags at HEAD: ${TAGS:-<none>}"
          echo "Subject: $(echo "$COMMIT_MSG" | head -n1)"

          if echo "$TAGS" | grep -qE '^unique-[a-z0-9_-]+-v[0-9]'; then
            echo "Release tag present — skipping."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          elif echo "$COMMIT_MSG" | head -n1 | grep -qE '^chore(\([^)]+\))?: release'; then
            echo "Release-please merge commit — skipping."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          elif echo "$COMMIT_MSG" | grep -qE '^Release-As:'; then
            echo "Release-cut prepare commit — skipping."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

  resolve:
    needs: guard
    if: needs.guard.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      dev_version: ${{ steps.version.outputs.dev_version }}
      cycle_floor: ${{ steps.version.outputs.cycle_floor }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Need enough history for `git diff <before>..<after>` and
          # `git rev-list --count HEAD` to be accurate.
          fetch-depth: 0

      - name: Detect changed publishable packages
        id: matrix
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.event.after }}
        run: |
          MATRIX="$(./.github/scripts/detect-changed-packages.sh "$BEFORE" "$AFTER")"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          {
            echo "### Dev publish — change detection"
            echo ""
            echo "- Base: \`$BEFORE\`"
            echo "- Head: \`$AFTER\`"
            echo "- Packages selected: $(echo "$MATRIX" | jq -r '.include | length')"
            echo ""
            echo '```json'
            echo "$MATRIX" | jq .
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Compute dev version
        id: version
        run: |
          CV="$(./.github/scripts/compute-calver.sh)"
          N="$(git rev-list --count HEAD)"
          DEV="${CV}.0.dev${N}"
          FLOOR="${CV}.0.dev0"
          echo "dev_version=$DEV" >> "$GITHUB_OUTPUT"
          echo "cycle_floor=$FLOOR" >> "$GITHUB_OUTPUT"
          {
            echo ""
            echo "- Dev version: \`$DEV\`"
            echo "- Dep floor:   \`$FLOOR\`"
          } >> "$GITHUB_STEP_SUMMARY"

  publish:
    needs: resolve
    if: fromJson(needs.resolve.outputs.matrix).include[0] != null
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve.outputs.matrix) }}
    name: publish-dev-${{ matrix.id }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          version: '0.11.5'

      - name: Rewrite pyproject.toml for dev version
        env:
          DEV_VERSION: ${{ needs.resolve.outputs.dev_version }}
          CYCLE_FLOOR: ${{ needs.resolve.outputs.cycle_floor }}
          PYPROJECT: ${{ matrix.dir }}/pyproject.toml
        run: |
          uv run --quiet --no-project --with tomlkit -- \
            python3 .github/scripts/rewrite-pyproject-for-dev.py \
              "$PYPROJECT" "$DEV_VERSION" "$CYCLE_FLOOR"

      - name: Show rewrite diff
        run: |
          echo "### ${{ matrix.id }} — pyproject.toml rewrite" >> "$GITHUB_STEP_SUMMARY"
          echo '```diff' >> "$GITHUB_STEP_SUMMARY"
          git --no-pager diff --no-color -- "${{ matrix.dir }}/pyproject.toml" | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Build package
        working-directory: ${{ matrix.dir }}
        env:
          UV_NO_SOURCES: 1
        run: uv build -o dist

      - name: Show wheel metadata
        working-directory: ${{ matrix.dir }}
        run: |
          WHEEL=$(ls dist/*.whl | head -n1)
          echo "### ${{ matrix.id }} — wheel METADATA ($(basename "$WHEEL"))" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          # Extract METADATA from the wheel (it's a zip). Show name, version,
          # and every Requires-Dist so the recorded dep graph is auditable
          # from the Actions summary alone.
          python3 -c "
          import sys, zipfile, re
          wheel = sys.argv[1]
          with zipfile.ZipFile(wheel) as zf:
              meta_name = next(n for n in zf.namelist() if n.endswith('.dist-info/METADATA'))
              text = zf.read(meta_name).decode()
          for line in text.splitlines():
              if re.match(r'^(Name|Version|Requires-Dist):', line):
                  print(line)
          " "$WHEEL" | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Publish to PyPI
        working-directory: ${{ matrix.dir }}
        run: uv publish --username __token__ --password "${{ secrets.PYPI_TOKEN }}"
