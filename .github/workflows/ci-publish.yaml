name: "[CI] Publish to PyPI"

on:
  push:
    branches: [main]
    paths:
      - 'unique_sdk/**'
      - 'unique_toolkit/**'
      - 'unique_mcp/**'
      - 'unique_orchestrator/**'
      - 'tool_packages/**'
      - 'postprocessors/**'
      - 'connectors/**'
      - '!**/docs/**'
      - '!**/mkdocs.yaml'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (required for manual dispatch, auto-detect only works on push)'
        type: choice
        options:
          - ''
          - all
          - sdk
          - toolkit
          - mcp
          - orchestrator
          - web_search
          - swot
          - follow_up_questions
          - stock_ticker
          - deep_research
          - internal_search
          - quartr
          - six
        default: ''

jobs:
  # --- Job 1: Bump versions from changelog staging entries ---
  # Runs in parallel with detect-changes. Only on push (not manual dispatch).
  version-bump:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      bumped: ${{ steps.bump.outputs.bumped }}
      version_summary: ${{ steps.bump.outputs.version_summary }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Detect and bump versions
        id: bump
        run: |
          BUMPED_PACKAGES=""
          VERSION_SUMMARY=""
          BOUNDARY_MARKER="<!-- CHANGELOG-BOUNDARY -->"

          PACKAGE_DIRS=(
            unique_sdk
            unique_toolkit
            unique_mcp
            unique_orchestrator
            tool_packages/unique_web_search
            tool_packages/unique_swot
            tool_packages/unique_deep_research
            tool_packages/unique_internal_search
            postprocessors/unique_follow_up_questions
            postprocessors/unique_stock_ticker
            connectors/unique_quartr
            connectors/unique_six
            connectors/unique_search_proxy
          )

          for pkg in "${PACKAGE_DIRS[@]}"; do
            CHANGELOG="$pkg/CHANGELOG.md"

            [ ! -f "$CHANGELOG" ] && continue
            grep -qF "$BOUNDARY_MARKER" "$CHANGELOG" || continue

            BOUNDARY_LINE=$(grep -nF "$BOUNDARY_MARKER" "$CHANGELOG" | head -1 | cut -d: -f1)
            STAGING=$(head -n "$((BOUNDARY_LINE - 1))" "$CHANGELOG")

            if echo "$STAGING" | grep -qE '^\+{1,3}\s'; then
              OLD_VERSION=$(grep -E '^version[[:space:]]*=' "$pkg/pyproject.toml" | head -1 | sed -E 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')

              echo "::group::Bumping $pkg"
              ./.github/scripts/auto-version-bump.sh "$pkg"
              echo "::endgroup::"

              NEW_VERSION=$(grep -E '^version[[:space:]]*=' "$pkg/pyproject.toml" | head -1 | sed -E 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
              BUMPED_PACKAGES="$BUMPED_PACKAGES $pkg"
              VERSION_SUMMARY="${VERSION_SUMMARY}| \`${pkg}\` | \`${OLD_VERSION}\` | \`${NEW_VERSION}\` |\n"
            fi
          done

          if [ -n "$BUMPED_PACKAGES" ]; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "packages=$BUMPED_PACKAGES" >> "$GITHUB_OUTPUT"
            {
              echo "version_summary<<SUMMARY_EOF"
              echo -e "$VERSION_SUMMARY"
              echo "SUMMARY_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit version bumps
        if: steps.bump.outputs.bumped == 'true'
        run: |
          git add -A
          git commit -m "chore: auto-bump versions [skip ci]

          Packages: ${{ steps.bump.outputs.packages }}"
          git push origin main

  # --- Job 2: Detect which packages changed (runs in parallel with version-bump) ---
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            sdk:
              - 'unique_sdk/**'
              - '!unique_sdk/**/docs/**'
            toolkit:
              - 'unique_toolkit/**'
              - '!unique_toolkit/**/docs/**'
            mcp:
              - 'unique_mcp/**'
            orchestrator:
              - 'unique_orchestrator/**'
            web_search:
              - 'tool_packages/unique_web_search/**'
            swot:
              - 'tool_packages/unique_swot/**'
            follow_up_questions:
              - 'postprocessors/unique_follow_up_questions/**'
            stock_ticker:
              - 'postprocessors/unique_stock_ticker/**'
            deep_research:
              - 'tool_packages/unique_deep_research/**'
            internal_search:
              - 'tool_packages/unique_internal_search/**'
            quartr:
              - 'connectors/unique_quartr/**'
            six:
              - 'connectors/unique_six/**'

      - name: Select packages
        id: set-matrix
        uses: ./.github/actions/select-packages
        with:
          packages: |
            [
              {"id": "sdk",                "dir": "unique_sdk",                                "pypi_name": "unique_sdk",                  "python": "3.11"},
              {"id": "toolkit",            "dir": "unique_toolkit",                            "pypi_name": "unique_toolkit",              "python": "3.12"},
              {"id": "mcp",                "dir": "unique_mcp",                                "pypi_name": "unique-mcp",                  "python": "3.12"},
              {"id": "orchestrator",       "dir": "unique_orchestrator",                       "pypi_name": "unique_orchestrator",         "python": "3.12"},
              {"id": "web_search",         "dir": "tool_packages/unique_web_search",           "pypi_name": "unique_web_search",           "python": "3.12"},
              {"id": "swot",               "dir": "tool_packages/unique_swot",                 "pypi_name": "unique-swot",                 "python": "3.12"},
              {"id": "follow_up_questions","dir": "postprocessors/unique_follow_up_questions", "pypi_name": "unique_follow_up_questions",  "python": "3.12"},
              {"id": "stock_ticker",       "dir": "postprocessors/unique_stock_ticker",        "pypi_name": "unique_stock_ticker",         "python": "3.12"},
              {"id": "deep_research",      "dir": "tool_packages/unique_deep_research",        "pypi_name": "unique_deep_research",        "python": "3.12"},
              {"id": "internal_search",    "dir": "tool_packages/unique_internal_search",      "pypi_name": "unique_internal_search",      "python": "3.12"},
              {"id": "quartr",             "dir": "connectors/unique_quartr",                  "pypi_name": "unique_quartr",               "python": "3.12"},
              {"id": "six",                "dir": "connectors/unique_six",                     "pypi_name": "unique_six",                  "python": "3.12"}
            ]
          selected: ${{ github.event.inputs.package }}
          changes: ${{ toJson(steps.filter.outputs) }}

  # --- Job 3: Publish to PyPI (waits for both version-bump and detect-changes) ---
  publish:
    needs: [version-bump, detect-changes]
    if: >-
      !cancelled()
      && needs.detect-changes.result == 'success'
      && (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped')
      && fromJson(needs.detect-changes.outputs.matrix).include[0] != null
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    name: publish-${{ matrix.id }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Detect package manager
        id: detect
        uses: ./.github/actions/detect-package-manager
        with:
          package_dir: ${{ matrix.dir }}

      - name: Publish with Poetry
        if: steps.detect.outputs.package_manager == 'poetry'
        uses: ./.github/actions/publish-to-pypi-with-poetry
        with:
          package_dir: ${{ matrix.dir }}
          package_name: ${{ matrix.pypi_name }}
          python_version: ${{ matrix.python }}
          poetry_version: '2.1.3'
          check_version: 'true'
          pypi_token: ${{ secrets.PYPI_TOKEN }}

      - name: Publish with uv
        if: steps.detect.outputs.package_manager == 'uv'
        uses: ./.github/actions/publish-to-pypi-with-uv
        with:
          package_dir: ${{ matrix.dir }}
          package_name: ${{ matrix.pypi_name }}
          python_version: ${{ matrix.python }}
          check_version: 'true'
          pypi_token: ${{ secrets.PYPI_TOKEN }}

  # --- Job 4: Post version summary as a comment on the originating PR ---
  notify:
    needs: [version-bump, publish]
    if: >-
      !cancelled()
      && needs.version-bump.result == 'success'
      && needs.version-bump.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Comment on PR with version info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_SUMMARY: ${{ needs.version-bump.outputs.version_summary }}
        run: |
          COMMIT_MSG=$(git log -1 --format='%s' "${{ github.sha }}")
          PR_NUMBER=$(echo "$COMMIT_MSG" | grep -oE '\(#([0-9]+)\)' | tail -1 | tr -d '(#)')

          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER=$(gh pr list --state merged --search "${{ github.sha }}" --json number --jq '.[0].number' 2>/dev/null || echo "")
          fi

          if [ -z "$PR_NUMBER" ]; then
            echo "Could not determine PR number — skipping comment"
            exit 0
          fi

          echo "Posting version summary to PR #$PR_NUMBER"

          COMMENT_BODY=$(cat <<EOF
          ## Version Bump Summary

          The following versions were published after merging this PR:

          | Package | Previous | New |
          |---------|----------|-----|
          ${VERSION_SUMMARY}
          _Automated by [CI Publish](/${{ github.repository }}/actions/runs/${{ github.run_id }})_
          EOF
          )
          COMMENT_BODY=$(echo "$COMMENT_BODY" | sed 's/^          //')

          gh pr comment "$PR_NUMBER" --body "$COMMENT_BODY"
