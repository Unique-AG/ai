name: "[CI] Publish to PyPI"

on:
  push:
    branches: [main]
    paths:
      - 'unique_sdk/**'
      - 'unique_toolkit/**'
      - 'unique_mcp/**'
      - 'unique_orchestrator/**'
      - 'tool_packages/**'
      - 'postprocessors/**'
      - 'connectors/**'
      - '!**/docs/**'
      - '!**/mkdocs.yaml'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (required for manual dispatch, auto-detect only works on push)'
        type: choice
        options:
          - ''
          - all
          - sdk
          - toolkit
          - mcp
          - orchestrator
          - web_search
          - swot
          - follow_up_questions
          - stock_ticker
          - deep_research
          - internal_search
          - quartr
          - six
        default: ''

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: ./.github/actions/detect-changes
        id: detect
        if: github.event_name == 'push'

      - uses: ./.github/actions/get-packages-matrix
        id: pkgs

      - name: Filter publishable packages
        id: filter
        run: |
          PACKAGES='${{ steps.pkgs.outputs.packages }}'
          FILTERED=$(echo "$PACKAGES" | jq -c '[.[] | select((.publish_skip != true) and (.pypi_name != null))]')
          echo "packages<<EOF" >> $GITHUB_OUTPUT
          echo "$FILTERED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Select packages
        id: set-matrix
        uses: ./.github/actions/select-packages
        with:
          packages: ${{ steps.filter.outputs.packages }}
          selected: ${{ github.event.inputs.package }}
          changes: ${{ steps.detect.outputs.changes || '{}' }}

  publish:
    needs: detect-changes
    if: ${{ fromJson(needs.detect-changes.outputs.matrix).include[0] != null }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    name: publish-${{ matrix.id }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Publish with uv
        uses: ./.github/actions/publish-to-pypi-with-uv
        with:
          package_dir: ${{ matrix.dir }}
          package_name: ${{ matrix.pypi_name }}
          python_version: ${{ matrix.python }}
          check_version: 'true'
          pypi_token: ${{ secrets.PYPI_TOKEN }}
