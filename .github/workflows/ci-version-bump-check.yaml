name: "[CI] Version Bump Check"

on:
  workflow_call:

jobs:
  dry-run:
    if: github.event_name == 'merge_group'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Dry-run version bump for all packages with staging entries
        run: |
          BOUNDARY_MARKER="<!-- ADD CHANGELOG ENTRY ABOVE THIS BOUNDARY -->"

          PACKAGE_DIRS=(
            unique_sdk
            unique_toolkit
            unique_mcp
            unique_orchestrator
            tool_packages/unique_web_search
            tool_packages/unique_swot
            tool_packages/unique_deep_research
            tool_packages/unique_internal_search
            postprocessors/unique_follow_up_questions
            postprocessors/unique_stock_ticker
            connectors/unique_quartr
            connectors/unique_six
            connectors/unique_search_proxy
          )

          CHECKED=0

          for pkg in "${PACKAGE_DIRS[@]}"; do
            CHANGELOG="$pkg/CHANGELOG.md"

            [ ! -f "$CHANGELOG" ] && continue
            grep -qF "$BOUNDARY_MARKER" "$CHANGELOG" || continue

            BOUNDARY_LINE=$(grep -nF "$BOUNDARY_MARKER" "$CHANGELOG" | head -1 | cut -d: -f1)
            STAGING=$(head -n "$((BOUNDARY_LINE - 1))" "$CHANGELOG")

            if echo "$STAGING" | grep -qE '^\+{1,3}\s'; then
              echo "::group::Dry-run bump for $pkg"
              ./.github/scripts/auto-version-bump.sh "$pkg" --dry-run
              echo "::endgroup::"
              CHECKED=$((CHECKED + 1))
            fi
          done

          if [ "$CHECKED" -eq 0 ]; then
            echo "No packages have staging entries — nothing to check"
          else
            echo "Dry-run succeeded for $CHECKED package(s)"
          fi
