name: "CI · No Manual Release Changes"

on:
  pull_request:
    branches:
      - main
      - "release/*"

jobs:
  check:
    if: github.actor != 'release-please[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout PR
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Check for forbidden version/changelog changes
        run: |
          set -euo pipefail

          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE" "$HEAD")

          ERRORS=()

          # Check CHANGELOG.md in any package directory
          while IFS= read -r file; do
            if [[ "$file" == */CHANGELOG.md || "$file" == "CHANGELOG.md" ]]; then
              ERRORS+=("$file")
            fi
          done <<< "$CHANGED"

          # Check .release-please-manifest.json
          if echo "$CHANGED" | grep -qx '.release-please-manifest.json'; then
            ERRORS+=(".release-please-manifest.json")
          fi

          # Check version field in pyproject.toml files
          TOMLS=$(echo "$CHANGED" | grep 'pyproject.toml$' || true)
          for toml in $TOMLS; do
            if git diff "$BASE" "$HEAD" -- "$toml" | grep -qE '^\+version = '; then
              ERRORS+=("$toml (version changed)")
            fi
          done

          if [[ ${#ERRORS[@]} -gt 0 ]]; then
            echo "::error::Manual version/changelog changes are not allowed — release-please manages these automatically."
            echo ""
            echo "The following files must not be changed in regular PRs:"
            for err in "${ERRORS[@]}"; do
              echo "  - $err"
            done
            echo ""
            echo "If you need to fix a changelog or version, do it via a conventional commit"
            echo "and let release-please generate the changes."
            exit 1
          fi

          echo "No forbidden version/changelog changes detected."
