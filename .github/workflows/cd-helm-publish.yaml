name: "[CD] Helm publish"

# Package one dedicated Helm chart and push it to OCI registries.
#
# Two version modes (see .github/scripts/helm_package_push.py):
#   - stable: omit `version`; the chart's Chart.yaml/values.yaml are already
#     bumped by release-please at the `# x-release-please-version` markers.
#   - dev/rc: pass the raw PyPI `version` (e.g. 2026.24.0.dev11); the script
#     stamps it in (SemVer-2 chart version, raw appVersion/image.tag) before
#     packaging. The container image at that tag is pushed first by
#     cd-containerize, so the chart resolves to an image that exists.
#
# The base library chart is pulled from oci://ghcr.io/unique-ag/helm, so the
# job logs into GHCR before resolving dependencies.

on:
  workflow_call:
    inputs:
      chart_dir:
        description: 'Chart directory (contains Chart.yaml), e.g. connectors/unique_search_proxy/deploy/helm-chart'
        required: true
        type: string
      registries:
        description: 'JSON array of OCI registries to push to, e.g. ["oci://ghcr.io/unique-ag/ai/helm"]'
        required: true
        type: string
      version:
        description: 'Raw PyPI version to stamp (dev/rc). Omit on stable to package the chart as checked out.'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  helm-publish:
    runs-on: ubuntu-latest
    environment: ${{ contains(inputs.registries, 'getunique.azurecr.io') && 'getunique-github-oidc' || '' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify helm is available
        run: helm version

      - name: Login to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GHCR_TOKEN" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Login to Azure as getunique token issuer (OIDC)
        if: contains(inputs.registries, 'getunique.azurecr.io')
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.CLIENT_ID }}
          tenant-id: ${{ vars.TENANT_ID }}
          subscription-id: ${{ vars.SUBSCRIPTION_ID }}

      - name: Login to getunique ACR
        if: contains(inputs.registries, 'getunique.azurecr.io')
        run: |
          TOKEN=$(az acr login --name getunique --expose-token --output tsv --query accessToken)
          echo "::add-mask::$TOKEN"
          echo "$TOKEN" | helm registry login getunique.azurecr.io \
            --username 00000000-0000-0000-0000-000000000000 \
            --password-stdin

      - name: Install helm-docs
        uses: ./.github/actions/install-helm-docs

      - name: Package and push chart
        env:
          REGISTRIES: ${{ inputs.registries }}
          VERSION: ${{ inputs.version }}
        run: |
          REGISTRY_ARGS=()
          while IFS= read -r registry; do
            REGISTRY_ARGS+=(--registry "$registry")
          done < <(jq -r '.[]' <<<"$REGISTRIES")

          VERSION_ARGS=()
          if [[ -n "$VERSION" ]]; then
            VERSION_ARGS=(--version "$VERSION")
          fi

          python3 .github/scripts/helm_package_push.py \
            --chart "${{ inputs.chart_dir }}" \
            "${REGISTRY_ARGS[@]}" \
            --destination "$RUNNER_TEMP/helm-dist" \
            "${VERSION_ARGS[@]}"
