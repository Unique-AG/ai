name: "Release · Please"

on:
  push:
    branches:
      - "main"
      - "release/*"
  # Manual trigger so the `release-cut` and `post-release` workflows can
  # kick release-please right after pushing a `Release-As:` trailer with
  # GITHUB_TOKEN (which by design does not fire push-triggered workflows).
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@a02a34c4d625f9be7cb89f4291f3d4484fec4e28 # v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
