name: "[CI] Auto-resolve version conflicts"

on:
  push:
    branches: [main]
    paths:
      - '**/pyproject.toml'
      - '**/CHANGELOG.md'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto-resolve version conflicts on open PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./.github/scripts/auto-resolve-version-conflicts.sh
