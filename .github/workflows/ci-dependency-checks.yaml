name: "[CI] Dependencies"

on:
  workflow_call:
    inputs:
      matrix:
        description: 'Pre-computed matrix JSON from detect-changes. When provided, skips running detect-changes.'
        type: string
        required: false
        default: ''
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to check (leave empty for auto-detect based on changes)'
        type: choice
        options:
          - ''
          - all
          - toolkit
          - sdk
          - mcp
          - orchestrator
          - web_search
          - swot
          - follow_up_questions
          - stock_ticker
          - deep_research
          - internal_search
          - quartr
        default: ''

jobs:
  # Skipped when matrix is passed in from ci.yaml (detect-changes already ran there).
  detect-changes:
    if: inputs.matrix == ''
    uses: ./.github/workflows/ci-detect-changes.yaml
    permissions:
      pull-requests: read
    with:
      package: ${{ inputs.package || '' }}

  check:
    needs: [detect-changes]
    if: always() && (needs.detect-changes.result == 'success' || needs.detect-changes.result == 'skipped') && fromJson(inputs.matrix || needs.detect-changes.outputs.matrix).include[0] != null
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(inputs.matrix || needs.detect-changes.outputs.matrix) }}
    name: deps-${{ matrix.id }}
    steps:
      - uses: actions/checkout@v4

      - name: Run min-deps tests with deptry
        uses: ./.github/actions/run-min-tests-and-deptry
        with:
          package_dir: ${{ matrix.dir }}
          python_version: ${{ matrix.python }}
