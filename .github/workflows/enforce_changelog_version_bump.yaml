name: "[chore] Enforce Changelog and Version Bump"

on:
  pull_request:
  merge_group:

jobs:
  detect-packages:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          # Simple filters - exclusions are handled by the validation script
          filters: |
            unique_sdk:
              - 'unique_sdk/**'
            unique_toolkit:
              - 'unique_toolkit/**'
            unique_orchestrator:
              - 'unique_orchestrator/**'
            unique_mcp:
              - 'unique_mcp/**'
            connectors/unique_quartr:
              - 'connectors/unique_quartr/**'
            connectors/unique_search_proxy:
              - 'connectors/unique_search_proxy/**'
            connectors/unique_six:
              - 'connectors/unique_six/**'
            postprocessors/unique_follow_up_questions:
              - 'postprocessors/unique_follow_up_questions/**'
            postprocessors/unique_stock_ticker:
              - 'postprocessors/unique_stock_ticker/**'
            tool_packages/unique_deep_research:
              - 'tool_packages/unique_deep_research/**'
            tool_packages/unique_internal_search:
              - 'tool_packages/unique_internal_search/**'
            tool_packages/unique_swot:
              - 'tool_packages/unique_swot/**'
            tool_packages/unique_web_search:
              - 'tool_packages/unique_web_search/**'

  validate-changes:
    needs: detect-packages
    if: needs.detect-packages.outputs.packages != '[]'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.detect-packages.outputs.packages) }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate changelog and version bump
        run: |
          # For pull_request: github.base_ref; for merge_group: github.event.merge_group.base_ref
          BASE_REF="${{ github.base_ref || github.event.merge_group.base_ref }}"
          ./.github/scripts/validate-changelog-version-bump.sh \
            --exclude "poetry.lock,uv.lock,CHANGELOG.md,docs/,mkdocs.yaml,.entangled/" \
            ${{ matrix.package }} \
            "$BASE_REF"

  status:
    name: CI / Changelog
    needs: [detect-packages, validate-changes]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Post status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ needs.detect-packages.result }}" == "failure" ]]; then
            STATE="failure"
            DESC="detect-packages failed"
          elif [[ "${{ needs.validate-changes.result }}" == "failure" ]]; then
            STATE="failure"
            DESC="Some changelog/version validations failed"
          elif [[ "${{ needs.validate-changes.result }}" == "cancelled" ]]; then
            STATE="error"
            DESC="Changelog validations were cancelled"
          else
            STATE="success"
            DESC="All changelog validations passed"
          fi

          gh api repos/${{ github.repository }}/statuses/${{ github.sha }} \
            -f state="$STATE" \
            -f context="CI / Changelog" \
            -f description="$DESC" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [[ "$STATE" != "success" ]]; then
            exit 1
          fi
