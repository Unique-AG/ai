name: "[CD] Release · Arm Version"

# In steady state the release-cut is fully automated by the `cut-and-arm`
# job in `cd-release.yaml`: merging the Release PR on `main` cuts the
# `release/YYYY.WW` branch and arms the next cycle automatically.
#
# This workflow is the manual escape hatch for cases where that
# automation isn't enough:
#
#   - bootstrap, before any release has ever been cut (no manifest entry
#     for compute-calver.sh to key off),
#   - retargeting after a skipped cycle (e.g. week 20 passed silently —
#     retarget the standing Release PR to 2026.22),
#   - shipping off-cadence (e.g. cut 2026.19.0 a week early),
#   - correcting a miscomputed CalVer.
#
# It pushes an empty `Release-As: YYYY.WW.0` commit directly to `main`.
# Each trailer overrides the previous one; no cleanup is needed.
#
# Runs on gh-static-ip-slim under the `release-workflow` environment so
# `prepare-next-cycle.sh` can authenticate as the Release Workflow App,
# which is a bypass actor on the main-branch ruleset and the only
# identity allowed to push directly to `main`.

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      year_week:
        description: "Target cycle as YYYY.WW (e.g. 2026.20). Leave empty to compute from manifest."
        required: false
        type: string

jobs:
  arm:
    runs-on: gh-static-ip-slim
    environment: release-workflow
    timeout-minutes: 5
    steps:
      - name: Ensure workflow runs from main
        run: |
          CURRENT_BRANCH="${GITHUB_REF#refs/heads/}"
          if [ "$CURRENT_BRANCH" != "main" ]; then
            echo "::error::This workflow must be run from the main branch (got: $CURRENT_BRANCH)"
            exit 1
          fi

      - name: Generate GitHub App token
        id: app-token
        uses: unique-ag/actions/github/app-token-create@08cc24e926dda3254b05aa898c362790ec506a3d
        with:
          app_id: ${{ vars.RELEASE_WORKFLOW_CLIENT_ID }}
          base64_encoded_private_key: ${{ secrets.RELEASE_WORKFLOW_APP_PRIVATE_KEY_B64 }}
          repositories: ai

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Arm cycle
        env:
          YEAR_WEEK: ${{ inputs.year_week }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [[ -n "$YEAR_WEEK" ]]; then
            ./.github/scripts/prepare-next-cycle.sh --year-week "$YEAR_WEEK"
          else
            ./.github/scripts/prepare-next-cycle.sh
          fi
