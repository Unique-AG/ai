name: "[CI] Config Compatibility Check"

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to check (empty=auto-detect, all=all packages)'
        type: choice
        options:
          - ''
          - all
          - toolkit
          - web_search
          - deep_research
          - swot
          - internal_search
          - skill_tool
          - stock_ticker
          - user_memory
          - follow_up_questions
          - six
        default: ''

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v3
        id: filter
        with:
          filters: |
            toolkit:
              - 'unique_toolkit/**'
            web_search:
              - 'tool_packages/unique_web_search/**'
            deep_research:
              - 'tool_packages/unique_deep_research/**'
            swot:
              - 'tool_packages/unique_swot/**'
            internal_search:
              - 'tool_packages/unique_internal_search/**'
            skill_tool:
              - 'tool_packages/unique_skill_tool/**'
            stock_ticker:
              - 'postprocessors/unique_stock_ticker/**'
            user_memory:
              - 'postprocessors/unique_user_memory/**'
            follow_up_questions:
              - 'postprocessors/unique_follow_up_questions/**'
            six:
              - 'connectors/unique_six/**'

      - uses: ./.github/actions/select-packages
        id: set-matrix
        with:
          packages: |
            [
              {"id": "toolkit", "dir": "unique_toolkit", "python": "3.12"},
              {"id": "web_search", "dir": "tool_packages/unique_web_search", "python": "3.12"},
              {"id": "deep_research", "dir": "tool_packages/unique_deep_research", "python": "3.12"},
              {"id": "swot", "dir": "tool_packages/unique_swot", "python": "3.12"},
              {"id": "internal_search", "dir": "tool_packages/unique_internal_search", "python": "3.12"},
              {"id": "skill_tool", "dir": "tool_packages/unique_skill_tool", "python": "3.12"},
              {"id": "stock_ticker", "dir": "postprocessors/unique_stock_ticker", "python": "3.12"},
              {"id": "user_memory", "dir": "postprocessors/unique_user_memory", "python": "3.12"},
              {"id": "follow_up_questions", "dir": "postprocessors/unique_follow_up_questions", "python": "3.12"},
              {"id": "six", "dir": "connectors/unique_six", "python": "3.12"}
            ]
          selected: ${{ inputs.package }}
          changes: ${{ toJson(steps.filter.outputs) }}

  check-config-compatibility:
    needs: detect-changes
    if: ${{ fromJson(needs.detect-changes.outputs.matrix).include[0] != null }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      # 1. Setup
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # Need full history for merge-base

      - name: Compute merge base
        id: base
        env:
          BASE_REF_NAME: ${{ github.base_ref || 'main' }}
        run: |
          BASE_REF="origin/$BASE_REF_NAME"
          git fetch origin "$BASE_REF_NAME"
          MERGE_BASE=$(git merge-base HEAD "$BASE_REF")
          echo "commit=$MERGE_BASE" >> $GITHUB_OUTPUT
          echo "Merge base: $MERGE_BASE"

      # 2. Export defaults from base commit
      - name: Checkout base commit
        run: git checkout ${{ steps.base.outputs.commit }} --quiet

      - name: Check package exists on base
        id: base_pkg
        run: |
          if [ -f "${{ matrix.dir }}/pyproject.toml" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Package '${{ matrix.dir }}' does not exist on base commit (new package); skipping base export."
          fi

      - name: Setup uv (base)
        if: steps.base_pkg.outputs.exists == 'true'
        uses: ./.github/actions/setup-uv
        with:
          package_dir: ${{ matrix.dir }}
          python_version: ${{ matrix.python }}
          lock_mode: frozen

      - name: Export base defaults
        if: steps.base_pkg.outputs.exists == 'true'
        working-directory: ${{ matrix.dir }}
        env:
          UV_NO_SOURCES: 1
        run: |
          # Only run export if the config checker exists in the base commit.
          if uv run python -c "import importlib.util; exit(0 if importlib.util.find_spec('unique_toolkit._common.config_checker') else 1)" 2>/dev/null; then
            uv run python -m unique_toolkit._common.config_checker export \
              --package . \
              --output "$GITHUB_WORKSPACE/config-artifacts-base/"
          else
            echo "⚠️ Config checker module not found in base commit. Skipping base export."
            mkdir -p "$GITHUB_WORKSPACE/config-artifacts-base/"
            echo '{"exported_count": 0, "skipped_count": 0, "warnings": [], "config_files": {}}' > "$GITHUB_WORKSPACE/config-artifacts-base/manifest.json"
          fi

      - name: Create empty base manifest for new package
        if: steps.base_pkg.outputs.exists == 'false'
        run: |
          mkdir -p "$GITHUB_WORKSPACE/config-artifacts-base/"
          echo '{"exported_count": 0, "skipped_count": 0, "warnings": [], "config_files": {}}' > "$GITHUB_WORKSPACE/config-artifacts-base/manifest.json"

      - name: Upload base artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: config-base-${{ matrix.id }}
          path: ./config-artifacts-base/
          retention-days: 1
          if-no-files-found: warn

      - name: Restore lock file before checkout
        run: |
          git restore uv.lock 2>/dev/null || true

      # 3. Checkout tip and validate
      - name: Checkout PR tip
        run: git checkout ${{ github.sha }} --quiet

      - name: Setup uv (tip)
        uses: ./.github/actions/setup-uv
        with:
          package_dir: ${{ matrix.dir }}
          python_version: ${{ matrix.python }}

      - name: Download base artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: config-base-${{ matrix.id }}
          path: ./config-artifacts-base/

      - name: Validate compatibility
        id: validate
        working-directory: ${{ matrix.dir }}
        env:
          UV_NO_SOURCES: 1
        run: |
          uv run python -m unique_toolkit._common.config_checker check \
            --artifacts "$GITHUB_WORKSPACE/config-artifacts-base/" \
            --package . \
            --report-defaults \
            --fail-on-missing \
            --output-report "$GITHUB_WORKSPACE/config-check-report.md"
        continue-on-error: true

      - name: Generate report
        if: always()
        run: |
          if [ "${{ steps.validate.outcome }}" == "failure" ]; then
            echo "## ❌ Configuration Check Failed for ${{ matrix.id }}" >> $GITHUB_STEP_SUMMARY
            if [ -f ./config-check-report.md ]; then
              cat ./config-check-report.md >> $GITHUB_STEP_SUMMARY
            else
              echo "Validation failed. See job logs for details." >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "## ✓ Configuration Check Passed for ${{ matrix.id }}" >> $GITHUB_STEP_SUMMARY
            if [ -f ./config-check-report.md ]; then
              echo "Default changes detected:" >> $GITHUB_STEP_SUMMARY
              cat ./config-check-report.md >> $GITHUB_STEP_SUMMARY
            else
              echo "No breaking configuration changes detected." >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Check validation result
        if: steps.validate.outcome == 'failure'
        run: |
          echo "❌ Configuration compatibility check failed"
          exit 1
