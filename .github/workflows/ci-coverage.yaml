name: "[CI] Coverage"

on:
  workflow_call:
    inputs:
      changes:
        description: 'Pre-computed changes JSON from ci.yaml (skips detection when set)'
        required: false
        type: string
        default: ''
      matrix:
        description: 'Pre-computed matrix JSON from ci.yaml (skips select-packages when set)'
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to check (leave empty for auto-detect based on changes)'
        type: choice
        options:
          - ''
          - all
          - toolkit
          - sdk
          - mcp
          - orchestrator
          - web_search
          - swot
          - follow_up_questions
          - stock_ticker
          - deep_research
          - internal_search
          - quartr
          - six
          - search_proxy
        default: ''

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      matrix: ${{ inputs.matrix || steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: ./.github/actions/detect-changes
        id: detect
        if: inputs.matrix == ''

      - name: Select packages
        id: set-matrix
        if: inputs.matrix == ''
        uses: ./.github/actions/select-packages
        with:
          packages: |
            [
              {"id": "toolkit",            "dir": "unique_toolkit",                            "python": "3.12", "min_coverage": "60"},
              {"id": "sdk",                "dir": "unique_sdk",                                "python": "3.11", "min_coverage": "60"},
              {"id": "mcp",                "dir": "unique_mcp",                                "python": "3.12", "min_coverage": "60"},
              {"id": "orchestrator",       "dir": "unique_orchestrator",                       "python": "3.12", "min_coverage": "60"},
              {"id": "web_search",         "dir": "tool_packages/unique_web_search",           "python": "3.12", "min_coverage": "60"},
              {"id": "swot",               "dir": "tool_packages/unique_swot",                 "python": "3.12", "min_coverage": "60"},
              {"id": "follow_up_questions","dir": "postprocessors/unique_follow_up_questions", "python": "3.12", "min_coverage": "60"},
              {"id": "stock_ticker",       "dir": "postprocessors/unique_stock_ticker",        "python": "3.12", "min_coverage": "60"},
              {"id": "deep_research",      "dir": "tool_packages/unique_deep_research",        "python": "3.12", "min_coverage": "60"},
              {"id": "internal_search",    "dir": "tool_packages/unique_internal_search",      "python": "3.12", "min_coverage": "60"},
              {"id": "quartr",             "dir": "connectors/unique_quartr",                  "python": "3.12", "min_coverage": "60"},
              {"id": "six",                "dir": "connectors/unique_six",                     "python": "3.12", "min_coverage": "60"},
              {"id": "search_proxy",       "dir": "connectors/unique_search_proxy",            "python": "3.12", "min_coverage": "60"}
            ]
          selected: ${{ github.event.inputs.package }}
          changes: ${{ inputs.changes || steps.detect.outputs.changes }}

  coverage:
    needs: detect-changes
    if: ${{ fromJson(needs.detect-changes.outputs.matrix).include[0] != null }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    name: cov-${{ matrix.id }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Run coverage check
        uses: ./.github/actions/run-coverage-check
        with:
          package_dir: ${{ matrix.dir }}
          python_version: ${{ matrix.python }}
          base_ref: origin/${{ github.base_ref || 'main' }}
          min_coverage: ${{ matrix.min_coverage }}
