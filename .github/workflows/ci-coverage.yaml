name: "[CI] Coverage - All Packages"

on:
  pull_request:
  merge_group:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to check (leave empty for auto-detect based on changes)'
        type: choice
        options:
          - ''
          - all
          - toolkit
          - sdk
          - mcp
          - orchestrator
          - web_search
          - swot
          - follow_up_questions
          - stock_ticker
          - deep_research
          - internal_search
          - quartr
        default: ''

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            toolkit:
              - 'unique_toolkit/**/!(*.md|docs/**|.entangled/**|*mkdocs.yaml)'
            sdk:
              - 'unique_sdk/**/!(*.md)'
            mcp:
              - 'unique_mcp/**/!(*.md)'
            orchestrator:
              - 'unique_orchestrator/**/!(*.md)'
            web_search:
              - 'tool_packages/unique_web_search/**/!(*.md)'
            swot:
              - 'tool_packages/unique_swot/**/!(*.md)'
            follow_up_questions:
              - 'postprocessors/unique_follow_up_questions/**/!(*.md)'
            stock_ticker:
              - 'postprocessors/unique_stock_ticker/**/!(*.md)'
            deep_research:
              - 'tool_packages/unique_deep_research/**/!(*.md)'
            internal_search:
              - 'tool_packages/unique_internal_search/**/!(*.md)'
            quartr:
              - 'connectors/unique_quartr/**/!(*.md)'

      - name: Select packages
        id: set-matrix
        uses: ./.github/actions/select-packages
        with:
          packages: |
            [
              {"id": "toolkit",            "dir": "unique_toolkit",                            "python": "3.12", "min_coverage": "60"},
              {"id": "sdk",                "dir": "unique_sdk",                                "python": "3.11", "min_coverage": "60"},
              {"id": "mcp",                "dir": "unique_mcp",                                "python": "3.12", "min_coverage": "60"},
              {"id": "orchestrator",       "dir": "unique_orchestrator",                       "python": "3.12", "min_coverage": "60"},
              {"id": "web_search",         "dir": "tool_packages/unique_web_search",           "python": "3.12", "min_coverage": "60"},
              {"id": "swot",               "dir": "tool_packages/unique_swot",                 "python": "3.12", "min_coverage": "60"},
              {"id": "follow_up_questions","dir": "postprocessors/unique_follow_up_questions", "python": "3.12", "min_coverage": "60"},
              {"id": "stock_ticker",       "dir": "postprocessors/unique_stock_ticker",        "python": "3.12", "min_coverage": "60"},
              {"id": "deep_research",      "dir": "tool_packages/unique_deep_research",        "python": "3.12", "min_coverage": "60"},
              {"id": "internal_search",    "dir": "tool_packages/unique_internal_search",      "python": "3.12", "min_coverage": "60"},
              {"id": "quartr",             "dir": "connectors/unique_quartr",                  "python": "3.12", "min_coverage": "60"}
            ]
          selected: ${{ github.event.inputs.package }}
          changes: ${{ toJson(steps.filter.outputs) }}

  coverage:
    needs: detect-changes
    if: ${{ fromJson(needs.detect-changes.outputs.matrix).include[0] != null }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    name: cov-${{ matrix.id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run coverage check
        uses: ./.github/actions/run-coverage-check
        with:
          package_dir: ${{ matrix.dir }}
          python_version: ${{ matrix.python }}
          base_ref: origin/${{ github.base_ref || 'main' }}
          min_coverage: ${{ matrix.min_coverage }}

  status:
    name: CI / Coverage
    needs: [detect-changes, coverage]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Post status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ needs.detect-changes.result }}" == "failure" ]]; then
            STATE="failure"
            DESC="detect-changes failed"
          elif [[ "${{ needs.coverage.result }}" == "failure" ]]; then
            STATE="failure"
            DESC="Some coverage checks failed"
          elif [[ "${{ needs.coverage.result }}" == "cancelled" ]]; then
            STATE="error"
            DESC="Coverage checks were cancelled"
          else
            STATE="success"
            DESC="All coverage checks passed"
          fi

          gh api repos/${{ github.repository }}/statuses/${{ github.sha }} \
            -f state="$STATE" \
            -f context="CI / Coverage" \
            -f description="$DESC" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [[ "$STATE" != "success" ]]; then
            exit 1
          fi
