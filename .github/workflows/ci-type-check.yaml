name: "[CI] Types"

on:
  workflow_call:
    inputs:
      changes:
        description: 'Pre-computed changes JSON from ci.yaml (skips detection when set)'
        required: false
        type: string
        default: ''
      matrix:
        description: 'Pre-computed matrix JSON from ci.yaml (skips select-packages when set)'
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to type check (leave empty for auto-detect based on changes)'
        type: choice
        options:
          - ''
          - all
          - toolkit
          - sdk
          - mcp
          - orchestrator
          - web_search
          - swot
          - follow_up_questions
          - stock_ticker
          - deep_research
          - internal_search
          - quartr
          - six
          - search_proxy
        default: ''

jobs:
  detect-changes:
    if: inputs.matrix == ''
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: ./.github/actions/detect-changes
        id: detect

      - name: Select packages
        id: set-matrix
        uses: ./.github/actions/select-packages
        with:
          packages: |
            [
              {"id": "toolkit",            "dir": "unique_toolkit",                            "python": "3.12", "use_baseline": true, "require_zero_errors": false},
              {"id": "sdk",                "dir": "unique_sdk",                                "python": "3.11", "use_baseline": true, "require_zero_errors": false},
              {"id": "mcp",                "dir": "unique_mcp",                                "python": "3.12", "use_baseline": true, "require_zero_errors": false},
              {"id": "orchestrator",       "dir": "unique_orchestrator",                       "python": "3.12", "use_baseline": true, "require_zero_errors": false},
              {"id": "web_search",         "dir": "tool_packages/unique_web_search",           "python": "3.12", "use_baseline": true, "require_zero_errors": false},
              {"id": "swot",               "dir": "tool_packages/unique_swot",                 "python": "3.12", "use_baseline": true, "require_zero_errors": false},
              {"id": "follow_up_questions","dir": "postprocessors/unique_follow_up_questions", "python": "3.12", "use_baseline": true, "require_zero_errors": false},
              {"id": "stock_ticker",       "dir": "postprocessors/unique_stock_ticker",        "python": "3.12", "use_baseline": true, "require_zero_errors": false},
              {"id": "deep_research",      "dir": "tool_packages/unique_deep_research",        "python": "3.12", "use_baseline": true, "require_zero_errors": false},
              {"id": "internal_search",    "dir": "tool_packages/unique_internal_search",      "python": "3.12", "use_baseline": true, "require_zero_errors": false},
              {"id": "quartr",             "dir": "connectors/unique_quartr",                  "python": "3.12", "use_baseline": true, "require_zero_errors": false},
              {"id": "six",                "dir": "connectors/unique_six",                     "python": "3.12", "use_baseline": true, "require_zero_errors": false},
              {"id": "search_proxy",       "dir": "connectors/unique_search_proxy",            "python": "3.12", "use_baseline": true, "require_zero_errors": false}
            ]
          selected: ${{ github.event.inputs.package }}
          changes: ${{ inputs.changes || steps.detect.outputs.changes }}

  type-check:
    needs: detect-changes
    if: >-
      !cancelled()
      && (needs.detect-changes.result == 'success' || needs.detect-changes.result == 'skipped')
      && fromJson(inputs.matrix || needs.detect-changes.outputs.matrix).include[0] != null
    runs-on: ubuntu-latest
    continue-on-error: ${{ !matrix.require_zero_errors }}
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(inputs.matrix || needs.detect-changes.outputs.matrix) }}
    name: types-${{ matrix.id }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install reviewdog
        run: |
          curl -sfL https://raw.githubusercontent.com/reviewdog/reviewdog/master/install.sh | sh -s -- -b /tmp

      - name: Create baseline from base branch
        if: matrix.use_baseline
        uses: ./.github/actions/create-type-baseline
        with:
          package_dir: ${{ matrix.dir }}
          branch: ${{ github.base_ref || 'main' }}
          python_version: ${{ matrix.python }}

      - name: Run type check
        uses: ./.github/actions/type-check
        with:
          package_dir: ${{ matrix.dir }}
          python_version: ${{ matrix.python }}
          baseline_file: ${{ matrix.use_baseline && '/tmp/baseline.json' || '' }}
          output_file: /tmp/basedpyright.json

      - name: Report type errors
        continue-on-error: ${{ !matrix.require_zero_errors }}
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash ${{ github.workspace }}/.github/scripts/report-type-errors.sh \
            -r /tmp/reviewdog \
            -b ${{ github.base_ref || 'main' }} \
            ${{ github.workspace }}/${{ matrix.dir }} \
            /tmp/basedpyright.json
          EXIT=$?
          if [ "${{ matrix.require_zero_errors }}" = "true" ]; then
            exit $EXIT
          else
            exit 0
          fi
