name: "[CI] Types"

on:
  workflow_call:
    inputs:
      matrix:
        description: 'Pre-computed matrix JSON from detect-changes. When provided, skips running detect-changes.'
        type: string
        required: false
        default: ''
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to type check (leave empty for auto-detect based on changes)'
        type: choice
        options:
          - ''
          - all
          - toolkit
          - sdk
          - mcp
          - orchestrator
          - web_search
          - swot
          - follow_up_questions
          - stock_ticker
          - deep_research
          - internal_search
          - quartr
        default: ''

jobs:
  # Skipped when matrix is passed in from ci.yaml (detect-changes already ran there).
  detect-changes:
    if: inputs.matrix == ''
    uses: ./.github/workflows/ci-detect-changes.yaml
    permissions:
      pull-requests: read
    with:
      package: ${{ inputs.package || '' }}

  type-check:
    needs: [detect-changes]
    if: always() && (needs.detect-changes.result == 'success' || needs.detect-changes.result == 'skipped') && fromJson(inputs.matrix || needs.detect-changes.outputs.matrix).include[0] != null
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(inputs.matrix || needs.detect-changes.outputs.matrix) }}
    name: types-${{ matrix.id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install reviewdog
        run: |
          curl -sfL https://raw.githubusercontent.com/reviewdog/reviewdog/master/install.sh | sh -s -- -b /tmp

      - name: Create baseline from base branch
        uses: ./.github/actions/create-type-baseline
        with:
          package_dir: ${{ matrix.dir }}
          branch: ${{ github.base_ref || 'main' }}
          python_version: ${{ matrix.python }}

      - name: Run type check
        uses: ./.github/actions/type-check
        with:
          package_dir: ${{ matrix.dir }}
          python_version: ${{ matrix.python }}
          baseline_file: /tmp/baseline.json
          output_file: /tmp/basedpyright.json

      - name: Report type errors
        continue-on-error: true
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash ${{ github.workspace }}/.github/scripts/report-type-errors.sh \
            -r /tmp/reviewdog \
            -b ${{ github.base_ref || 'main' }} \
            ${{ github.workspace }}/${{ matrix.dir }} \
            /tmp/basedpyright.json || true
