name: "[unique_search_proxy 🧪] Publish Proxy"

on:
  push:
    branches:
      - main
    paths:
      - connectors/unique_search_proxy/**
      - .github/workflows/unique_search_proxy-publish.yaml
  pull_request:
    branches:
      - main
    paths:
      - connectors/unique_search_proxy/**
      - .github/workflows/unique_search_proxy-publish.yaml

jobs:
  publish-package:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Get package version
        id: version
        working-directory: connectors/unique_search_proxy
        run: |
          VERSION=$(python3 -c "import tomllib; f=open('pyproject.toml', 'rb'); data=tomllib.load(f); print(data['project']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Publish to PyPI
        uses: ./.github/actions/publish-to-pypi-with-uv
        with:
          package_dir: connectors/unique_search_proxy
          package_name: unique-search-proxy
          python_version: '3.12'
          check_version: 'true'
          pypi_token: ${{ secrets.PYPI_TOKEN }}

  containerize:
    needs: publish-package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      packages: write
    env:
      CHART_REPO: ghcr.io/unique-ag/ai/search-proxy

    steps:
      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          fetch-depth: 2

      - name: Setup docker buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Add docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.CHART_REPO }}
          tags: |
            type=sha,prefix=experimental-,format=short

      - name: Login to registry hub
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          build-args: |
            PACKAGE_VERSION=${{ needs.publish-package.outputs.version }}
          cache-from: type=registry,ref=${{ env.CHART_REPO }}:cache
          cache-to: type=registry,ref=${{ env.CHART_REPO }}:cache,mode=min
          context: connectors/unique_search_proxy/deploy
          file: connectors/unique_search_proxy/deploy/Dockerfile
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          provenance: false
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  validate-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Setup docker buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Validate Dockerfile builds
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          build-args: |
            PACKAGE_VERSION=0.0.0-pr-validation
          context: connectors/unique_search_proxy/deploy
          file: connectors/unique_search_proxy/deploy/Dockerfile
          platforms: linux/amd64
          push: false
