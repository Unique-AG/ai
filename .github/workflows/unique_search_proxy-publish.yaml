name: "[unique_search_proxy] Publish Container"

on:
  pull_request:
    paths:
      - connectors/unique_search_proxy/**
      - .github/workflows/unique_search_proxy-publish.yaml
  release:
    types: [published]

jobs:
  validate-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Build wheel from source
        working-directory: connectors/unique_search_proxy
        run: uv build --wheel --out-dir deploy/

      - name: Resolve wheel filename
        id: wheel
        working-directory: connectors/unique_search_proxy/deploy
        run: echo "name=$(ls unique_search_proxy-*.whl)" >> $GITHUB_OUTPUT

      - name: Setup docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build container (no push)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          build-args: |
            LOCAL_WHEEL=${{ steps.wheel.outputs.name }}
          context: connectors/unique_search_proxy/deploy
          file: connectors/unique_search_proxy/deploy/Dockerfile
          platforms: linux/amd64
          push: false

  containerize:
    # Only run for unique-search-proxy releases created by release-please
    if: >
      github.event_name == 'release' &&
      startsWith(github.event.release.tag_name, 'unique-search-proxy-v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      packages: write
    env:
      CHART_REPO: ghcr.io/unique-ag/ai/search-proxy

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # Strip component prefix: unique-search-proxy-v0.2.1 -> 0.2.1
          VERSION="${TAG#unique-search-proxy-v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Export hash-pinned requirements
        run: >
          uv export --locked
          --package unique-search-proxy
          --no-dev --no-emit-project
          -o connectors/unique_search_proxy/deploy/requirements.txt

      - name: Setup docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Add docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.CHART_REPO }}
          tags: |
            type=raw,value=latest
            type=raw,value=v${{ steps.version.outputs.version }}
            type=sha,prefix=sha-,format=short

      - name: Login to registry hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          build-args: |
            PACKAGE_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=registry,ref=${{ env.CHART_REPO }}:cache
          cache-to: type=registry,ref=${{ env.CHART_REPO }}:cache,mode=min
          context: connectors/unique_search_proxy/deploy
          file: connectors/unique_search_proxy/deploy/Dockerfile
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          provenance: false
          push: true
          tags: ${{ steps.meta.outputs.tags }}
