name: "[unique_search_proxy 🧪] Publish Proxy"

on:
  pull_request:
    paths:
      - connectors/unique_search_proxy/**
      - .github/workflows/unique_search_proxy-publish.yaml
  push:
    branches:
      - main
    paths:
      - connectors/unique_search_proxy/**
      - .github/workflows/unique_search_proxy-publish.yaml

jobs:
  validate-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Build wheel from source
        working-directory: connectors/unique_search_proxy
        run: uv build --wheel --out-dir deploy/

      - name: Resolve wheel filename
        id: wheel
        working-directory: connectors/unique_search_proxy/deploy
        run: echo "name=$(ls unique_search_proxy-*.whl)" >> $GITHUB_OUTPUT

      - name: Setup docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build container (no push)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          build-args: |
            LOCAL_WHEEL=${{ steps.wheel.outputs.name }}
          context: connectors/unique_search_proxy/deploy
          file: connectors/unique_search_proxy/deploy/Dockerfile
          platforms: linux/amd64
          push: false

  publish-package:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: pypi-publish
    timeout-minutes: 10
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get package version
        id: version
        working-directory: connectors/unique_search_proxy
        run: |
          VERSION=$(python3 -c "import tomllib; f=open('pyproject.toml', 'rb'); data=tomllib.load(f); print(data['project']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Publish to PyPI
        uses: ./.github/actions/publish-to-pypi-with-uv
        with:
          package_dir: connectors/unique_search_proxy
          package_name: unique-search-proxy
          python_version: '3.12'
          check_version: 'true'
          pypi_token: ${{ secrets.PYPI_PUBLISH_TOKEN }}

  containerize:
    needs: publish-package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      packages: write
    env:
      CHART_REPO: ghcr.io/unique-ag/ai/search-proxy

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Export hash-pinned requirements
        run: >
          uv export --locked
          --package unique-search-proxy
          --no-dev --no-emit-project
          -o connectors/unique_search_proxy/deploy/requirements.txt

      - name: Setup docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Add docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.CHART_REPO }}
          tags: |
            type=sha,prefix=experimental-,format=short

      - name: Login to registry hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          build-args: |
            PACKAGE_VERSION=${{ needs.publish-package.outputs.version }}
          cache-from: type=registry,ref=${{ env.CHART_REPO }}:cache
          cache-to: type=registry,ref=${{ env.CHART_REPO }}:cache,mode=min
          context: connectors/unique_search_proxy/deploy
          file: connectors/unique_search_proxy/deploy/Dockerfile
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          provenance: false
          push: true
          tags: ${{ steps.meta.outputs.tags }}
