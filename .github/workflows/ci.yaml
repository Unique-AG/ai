name: CI

on:
  pull_request:
  merge_group:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to check (empty=auto-detect based on changes, all=all packages)'
        type: choice
        options:
          - ''
          - all
          - toolkit
          - sdk
          - mcp
          - orchestrator
          - web_search
          - swot
          - follow_up_questions
          - stock_ticker
          - deep_research
          - internal_search
          - quartr
        default: ''

jobs:
  # Runs once here so the matrix is computed a single time and passed to each
  # ci-*.yaml below. When those workflows are dispatched standalone they still
  # run detect-changes themselves via the conditional inside each file.
  detect-changes:
    uses: ./.github/workflows/ci-detect-changes.yaml
    permissions:
      pull-requests: read
    with:
      package: ${{ inputs.package || '' }}

  lint:
    needs: detect-changes
    uses: ./.github/workflows/ci-lint.yaml
    with:
      matrix: ${{ needs.detect-changes.outputs.matrix }}

  test:
    needs: detect-changes
    uses: ./.github/workflows/ci-pytest.yaml
    with:
      matrix: ${{ needs.detect-changes.outputs.matrix }}

  type-check:
    needs: detect-changes
    uses: ./.github/workflows/ci-type-check.yaml
    permissions:
      contents: read
      pull-requests: write
    with:
      matrix: ${{ needs.detect-changes.outputs.matrix }}

  coverage:
    needs: detect-changes
    uses: ./.github/workflows/ci-coverage.yaml
    permissions:
      contents: read
      pull-requests: write
    with:
      matrix: ${{ needs.detect-changes.outputs.matrix }}

  deps:
    needs: detect-changes
    uses: ./.github/workflows/ci-dependency-checks.yaml
    with:
      matrix: ${{ needs.detect-changes.outputs.matrix }}

  config:
    name: Config Compatibility Check
    uses: ./.github/workflows/ci-config-check.yaml

  changelog:
    name: Changelog and Version Bump
    uses: ./.github/workflows/enforce_changelog_version_bump.yaml

  pr-title:
    name: PR Title
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/chore_validate_pr_title.yaml
    permissions:
      pull-requests: read

  status:
    name: Gatekeeper
    needs: [lint, test, type-check, coverage, deps, config, changelog, pr-title]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Check results
        id: check
        env:
          LINT: ${{ needs.lint.result }}
          TEST: ${{ needs.test.result }}
          TYPES: ${{ needs.type-check.result }}
          COVERAGE: ${{ needs.coverage.result }}
          DEPS: ${{ needs.deps.result }}
          CONFIG: ${{ needs.config.result }}
          CHANGELOG: ${{ needs.changelog.result }}
          PR_TITLE: ${{ needs.pr-title.result }}
        run: |
          echo "=== CI Status Summary ==="
          echo "lint:      $LINT"
          echo "test:      $TEST"
          echo "types:     $TYPES"
          echo "coverage:  $COVERAGE"
          echo "deps:      $DEPS"
          echo "config:    $CONFIG"
          echo "changelog: $CHANGELOG"
          echo "pr-title:  $PR_TITLE"
          echo "========================="

          failed=false

          # Required checks (skipped is acceptable — e.g. no packages changed, merge_group)
          for check in "lint:$LINT" "test:$TEST" "coverage:$COVERAGE" "deps:$DEPS" "config:$CONFIG" "changelog:$CHANGELOG" "pr-title:$PR_TITLE"; do
            name="${check%%:*}"
            result="${check##*:}"
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "❌ $name: $result"
              failed=true
            fi
          done

          # Types is continue-on-error — report but never fail the gate
          if [[ "$TYPES" == "failure" ]]; then
            echo "⚠️  types failed (non-blocking)"
          fi

          if [[ "$failed" == "true" ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "description=CI checks failed" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
            echo "description=All CI checks passed" >> $GITHUB_OUTPUT
          fi

      - name: Post commit status
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          STATE: ${{ steps.check.outputs.status }}
          DESCRIPTION: ${{ steps.check.outputs.description }}
        run: |
          gh api repos/${{ github.repository }}/statuses/$SHA \
            -f state="$STATE" \
            -f context="CI / Gatekeeper" \
            -f description="$DESCRIPTION" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Fail if checks failed
        if: steps.check.outputs.status == 'failure'
        run: exit 1
