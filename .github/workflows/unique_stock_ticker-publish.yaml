name: "[unique_stock_ticker 📦] Publish to PyPI"

on:
  workflow_dispatch:
  push:
    # Both conditions must be met (AND logic):
    # 1. Push must be to main branch
    # 2. Push must include changes to postprocessors/unique_stock_ticker/** files
    paths:
      - 'postprocessors/unique_stock_ticker/**'
    branches:
      - main

env:
  PACKAGE_NAME: stock_ticker
  PACKAGE_DIR: ./postprocessors/unique_stock_ticker

jobs:
  build-and-publish:
    name: Build distribution 📦
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Publish to PyPI
      uses: ./.github/actions/publish-to-pypi-with-poetry
      with:
        package_dir: ${{ env.PACKAGE_DIR }}
        python_version: '3.12'
        pypi_token: ${{ secrets.PYPI_TOKEN }}
