name: "[unique_follow_up_questions 📦] Publish to PyPI"

on:
  workflow_dispatch:
  push:
    # Both conditions must be met (AND logic):
    # 1. Push must be to main branch
    # 2. Push must include changes to follow_up_questions/** files
    paths:
      - 'postprocessors/follow_up_questions/**'
    branches:
      - main

env:
  PACKAGE_NAME: follow_up_questions
  PACKAGE_DIR: ./postprocessors/unique_follow_up_questions

jobs:
  build-and-publish:
    name: Build distribution 📦
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Publish to PyPI
      uses: ./.github/actions/publish-to-pypi-with-poetry
      with:
        package_dir: ${{ env.PACKAGE_DIR }}
        python_version: '3.12'
        pypi_token: ${{ secrets.PYPI_TOKEN }}
