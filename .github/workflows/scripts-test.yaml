name: "[chore] Test CI Scripts"

on:
  pull_request:
    paths:
      - ".github/scripts/**"
      - ".github/workflows/scripts-test.yaml"
      - ".github/actions/get-packages-matrix/package_configuration.json"
  push:
    branches:
      - main
    paths:
      - ".github/scripts/**"
      - ".github/workflows/scripts-test.yaml"
      - ".github/actions/get-packages-matrix/package_configuration.json"

jobs:
  test-scripts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Install BATS
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run BATS tests
        run: |
          bats .github/scripts/tests/*.bats --tap

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: '0.11.5'

      - name: Run Python unit tests
        run: |
          # Resolver tests need only stdlib; rewriter tests need tomlkit.
          # One venv for both keeps the step simple.
          uv run --quiet --no-project --with 'tomlkit==0.14.0' -- \
            python3 -m unittest discover \
              --start-directory .github/scripts/tests \
              --pattern 'test_*.py' \
              --verbose
