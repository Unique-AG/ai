name: "[CD] Containerize"

on:
  workflow_call:
    inputs:
      package_dir:
        description: 'Package root directory (contains deploy/Dockerfile)'
        required: true
        type: string
      pypi_name:
        description: 'PyPI distribution name'
        required: true
        type: string
      image_repo:
        description: 'Container image repository (e.g. ghcr.io/org/image)'
        required: true
        type: string
      version:
        description: 'Version to tag the image with'
        required: true
        type: string
      tag_latest:
        description: 'When true, additionally tag latest and v<version> (stable). The raw <version> tag is always emitted so chart image.tag resolves.'
        required: false
        type: boolean
        default: false
      python:
        description: 'Python version (kept for interface compatibility, unused)'
        required: false
        type: string
        default: '3.12'
      ref:
        description: 'Git ref to build from (branch, tag, or full SHA). Must match the ref used by the publish job so the image and wheel are identical. Defaults to the workflow trigger ref.'
        required: false
        type: string
        default: ''

permissions:
  packages: write

jobs:
  containerize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Add docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ inputs.image_repo }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=${{ inputs.version }}
            type=raw,value=v${{ inputs.version }},enable=${{ inputs.tag_latest }}
            type=raw,value=latest,enable=${{ inputs.tag_latest }}

      - name: Login to registry hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          cache-from: type=registry,ref=${{ inputs.image_repo }}:cache
          cache-to: type=registry,ref=${{ inputs.image_repo }}:cache,mode=min
          context: .
          file: ${{ inputs.package_dir }}/deploy/Dockerfile
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          provenance: false
          push: true
          tags: ${{ steps.meta.outputs.tags }}
