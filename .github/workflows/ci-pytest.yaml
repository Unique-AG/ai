name: "[CI] Test"

on:
  workflow_call:
    inputs:
      changes:
        description: 'Pre-computed changes JSON from ci.yaml (skips detection when set)'
        required: false
        type: string
        default: ''
      matrix:
        description: 'Pre-computed matrix JSON from ci.yaml (skips select-packages when set)'
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to test (leave empty for auto-detect based on changes)'
        type: choice
        options:
          - ''
          - all
          - toolkit
          - sdk
          - mcp
          - orchestrator
          - web_search
          - swot
          - follow_up_questions
          - stock_ticker
          - deep_research
          - internal_search
          - quartr
          - six
          - search_proxy
        default: ''

jobs:
  detect-changes:
    if: inputs.matrix == ''
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: ./.github/actions/detect-changes
        id: detect

      - uses: ./.github/actions/get-packages-matrix
        id: pkgs

      - name: Select packages
        id: set-matrix
        uses: ./.github/actions/select-packages
        with:
          packages: ${{ steps.pkgs.outputs.packages }}
          selected: ${{ github.event.inputs.package }}
          changes: ${{ inputs.changes || steps.detect.outputs.changes }}

  test:
    needs: detect-changes
    if: >-
      !cancelled()
      && (needs.detect-changes.result == 'success' || needs.detect-changes.result == 'skipped')
      && fromJson(inputs.matrix || needs.detect-changes.outputs.matrix).include[0] != null
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(inputs.matrix || needs.detect-changes.outputs.matrix) }}
    name: test-${{ matrix.id }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run tests
        uses: ./.github/actions/run-tests
        with:
          package_dir: ${{ matrix.dir }}
          python_version: ${{ matrix.python }}
          install_args: ${{ matrix.install_args }}
          test_args: ${{ matrix.test_args }}
