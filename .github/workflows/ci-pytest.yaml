name: "[CI] Test"

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to test (leave empty for auto-detect based on changes)'
        type: choice
        options:
          - ''
          - all
          - toolkit
          - sdk
          - mcp
          - orchestrator
          - web_search
          - swot
          - follow_up_questions
          - stock_ticker
          - deep_research
          - internal_search
          - quartr
          - six
          - search_proxy
        default: ''

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            toolkit:
              - 'unique_toolkit/**/!(*.md|docs/**|.entangled/**|*mkdocs.yaml)'
            sdk:
              - 'unique_sdk/**/!(*.md)'
            mcp:
              - 'unique_mcp/**/!(*.md)'
            orchestrator:
              - 'unique_orchestrator/**/!(*.md)'
            web_search:
              - 'tool_packages/unique_web_search/**/!(*.md)'
            swot:
              - 'tool_packages/unique_swot/**/!(*.md)'
            follow_up_questions:
              - 'postprocessors/unique_follow_up_questions/**/!(*.md)'
            stock_ticker:
              - 'postprocessors/unique_stock_ticker/**/!(*.md)'
            deep_research:
              - 'tool_packages/unique_deep_research/**/!(*.md)'
            internal_search:
              - 'tool_packages/unique_internal_search/**/!(*.md)'
            quartr:
              - 'connectors/unique_quartr/**/!(*.md)'
            six:
              - 'connectors/unique_six/**/!(*.md)'
            search_proxy:
              - 'connectors/unique_search_proxy/**/!(*.md)'

      - name: Select packages
        id: set-matrix
        uses: ./.github/actions/select-packages
        with:
          packages: |
            [
              {"id": "toolkit",            "dir": "unique_toolkit",                            "python": "3.12", "install_args": "--extra fastapi"},
              {"id": "sdk",                "dir": "unique_sdk",                                "python": "3.11", "test_args": "-m \"not integration\""},
              {"id": "mcp",                "dir": "unique_mcp",                                "python": "3.12"},
              {"id": "orchestrator",       "dir": "unique_orchestrator",                       "python": "3.12"},
              {"id": "web_search",         "dir": "tool_packages/unique_web_search",           "python": "3.12"},
              {"id": "swot",               "dir": "tool_packages/unique_swot",                 "python": "3.12"},
              {"id": "follow_up_questions","dir": "postprocessors/unique_follow_up_questions", "python": "3.12"},
              {"id": "stock_ticker",       "dir": "postprocessors/unique_stock_ticker",        "python": "3.12"},
              {"id": "deep_research",      "dir": "tool_packages/unique_deep_research",        "python": "3.12"},
              {"id": "internal_search",    "dir": "tool_packages/unique_internal_search",      "python": "3.12"},
              {"id": "quartr",             "dir": "connectors/unique_quartr",                  "python": "3.12"},
              {"id": "six",                "dir": "connectors/unique_six",                     "python": "3.12"},
              {"id": "search_proxy",       "dir": "connectors/unique_search_proxy",            "python": "3.12"}
            ]
          selected: ${{ github.event.inputs.package }}
          changes: ${{ toJson(steps.filter.outputs) }}

  test:
    needs: detect-changes
    if: ${{ fromJson(needs.detect-changes.outputs.matrix).include[0] != null }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    name: test-${{ matrix.id }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run tests
        uses: ./.github/actions/run-tests
        with:
          package_dir: ${{ matrix.dir }}
          python_version: ${{ matrix.python }}
          install_args: ${{ matrix.install_args }}
          test_args: ${{ matrix.test_args }}
