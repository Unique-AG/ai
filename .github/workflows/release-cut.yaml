name: "Release · Cut Branch"

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      year:
        description: "Year (YYYY). Leave empty for current year."
        required: false
        type: string
      week:
        description: "Calendar week (WW). Leave empty for current week."
        required: false
        type: string
      commit_sha:
        description: "Commit SHA to branch from. Defaults to HEAD of main."
        required: false
        type: string

jobs:
  cut-branch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ensure workflow runs from main
        run: |
          CURRENT_BRANCH="${GITHUB_REF#refs/heads/}"
          if [ "$CURRENT_BRANCH" != "main" ]; then
            echo "::error::This workflow must be run from the main branch (got: $CURRENT_BRANCH)"
            exit 1
          fi

      - name: Compute branch name
        id: branch
        run: |
          YEAR="${{ inputs.year }}"
          WEEK="${{ inputs.week }}"
          [[ -z "$YEAR" ]] && YEAR=$(date +"%Y")
          [[ -z "$WEEK" ]] && WEEK=$(date +"%V")

          WEEK=$(printf "%02d" "$((10#$WEEK))")

          if (( 10#$WEEK % 2 != 0 )); then
            echo "::error::Week $WEEK is odd — releases use even-numbered weeks. Pass an explicit 'week' input to override."
            exit 1
          fi

          BRANCH="release/${YEAR}.${WEEK}"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "Release branch: $BRANCH"

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Verify commit
        id: verify
        run: |
          if [[ -n "${{ inputs.commit_sha }}" ]]; then
            git fetch origin "${{ inputs.commit_sha }}" --depth=1
            SHA=$(git rev-parse --verify "${{ inputs.commit_sha }}")
          else
            SHA=$(git rev-parse HEAD)
          fi
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "Branching from: $SHA"

      - name: Check branch does not exist
        run: |
          BRANCH="${{ steps.branch.outputs.branch }}"
          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            echo "::error::Branch $BRANCH already exists on remote"
            exit 1
          fi

      - name: Create and push release branch
        run: |
          git checkout "${{ steps.verify.outputs.sha }}"
          git checkout -b "${{ steps.branch.outputs.branch }}"
          git push origin "${{ steps.branch.outputs.branch }}"
          echo "Created and pushed ${{ steps.branch.outputs.branch }}"
