name: "[docs] Test versioned docs build"

# Run the same build as deploy (root + SDK + Toolkit) on PRs so breakages are caught before merge.

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yaml'
      - 'unique_sdk/docs/**'
      - 'unique_sdk/mkdocs.yaml'
      - 'unique_toolkit/docs/**'
      - 'unique_toolkit/mkdocs.yaml'
      - 'tutorials/docs/**'
      - 'tutorials/mkdocs.yaml'
      - '.github/scripts/docs_build_versioned.sh'
      - 'pyproject.toml'
      - '.github/workflows/docs_build_test.yaml'
      - 'unique_toolkit/generate_examples.sh'
      - 'unique_toolkit/scripts/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup uv
        uses: ./.github/actions/setup-uv
        with:
          package_dir: .
          python_version: '3.12'

      - name: Install docs dependencies
        run: uv sync --locked --inexact --no-default-groups --group docs

      - name: Build versioned documentation
        run: ./.github/scripts/docs_build_versioned.sh --clean


      - name: Install toolkit packages for example validation
        # --inexact preserves the docs group (entangled-cli) installed above.
        # Without it, this sync prunes 112 packages from the env — including
        # entangled-cli — and generate_examples.sh then silently falls back
        # to the annotated `.python_files/*.py` left behind by `mkdocs build`,
        # producing apparent drift in `examples_from_docs/`.
        run: |
          uv sync --locked --inexact --package unique_sdk --package unique_toolkit
          uv sync --inexact --package unique_toolkit --extra langchain

      - name: Regenerate doc examples and check drift
        run: |
          cd unique_toolkit
          UV_PROJECT="${{ github.workspace }}/pyproject.toml" ./generate_examples.sh
          git diff --exit-code docs/examples_from_docs/

      - name: Validate doc examples
        run: uv run python unique_toolkit/scripts/validate_doc_examples.py

