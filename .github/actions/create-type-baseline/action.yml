name: 'Create Type Baseline'
description: 'Creates a type checking baseline from a specified branch using uv'

inputs:
  package_dir:
    description: 'Path to the package directory'
    required: true
  branch:
    description: 'Branch/ref to create baseline from'
    required: false
    default: 'main'
  python_version:
    description: 'Python version to use'
    required: false
    default: '3.11'
  output_file:
    description: 'Output file for baseline'
    required: false
    default: '/tmp/baseline.json'

runs:
  using: 'composite'
  steps:
    - name: Setup uv
      uses: ./.github/actions/setup-uv
      with:
        package_dir: ${{ inputs.package_dir }}
        python_version: ${{ inputs.python_version }}

    - name: Save script before checkout
      shell: bash
      run: |
        cp ${{ github.workspace }}/.github/scripts/create-type-baseline.sh /tmp/create-type-baseline.sh
        cp -r ${{ github.workspace }}/.github/scripts/lib /tmp/lib

    - name: Fetch base branch
      shell: bash
      run: git fetch origin ${{ inputs.branch }}:${{ inputs.branch }}

    - name: Restore lock file before checkout
      shell: bash
      run: git restore uv.lock 2>/dev/null || true

    - name: Checkout base branch
      shell: bash
      run: git checkout "origin/${{ inputs.branch }}" --quiet

    - name: Check package exists on base branch
      id: check
      shell: bash
      run: |
        if [ -f "${{ inputs.package_dir }}/pyproject.toml" ]; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "::notice::Package '${{ inputs.package_dir }}' does not exist on '${{ inputs.branch }}' (new package); creating empty baseline."
        fi

    - name: Install dependencies on base branch
      if: steps.check.outputs.exists == 'true'
      shell: bash
      run: |
        PKG_NAME=$(grep '^name' "${{ inputs.package_dir }}/pyproject.toml" | head -1 | sed 's/.*= *"\(.*\)"/\1/')
        uv sync --locked --package "$PKG_NAME"
        uv sync --locked --inexact --only-dev

    - name: Discard lock file changes
      if: steps.check.outputs.exists == 'true'
      shell: bash
      run: |
        git restore uv.lock 2>/dev/null || true
        git clean -f -- uv.lock 2>/dev/null || true

    - name: Create baseline
      if: steps.check.outputs.exists == 'true'
      shell: bash
      working-directory: ${{ inputs.package_dir }}
      run: |
        bash /tmp/create-type-baseline.sh \
          -c \
          -r "uv run" \
          -o "${{ inputs.output_file }}" \
          ${{ github.workspace }}/${{ inputs.package_dir }} \
          ${{ inputs.branch }}

    - name: Create empty baseline for new package
      if: steps.check.outputs.exists == 'false'
      shell: bash
      run: |
        : > "${{ inputs.output_file }}"
        git checkout - --quiet
