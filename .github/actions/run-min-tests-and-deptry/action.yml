name: 'Run Min Tests and Deptry'
description: 'Runs deptry and min-deps pytest tests using uv'

inputs:
  package_dir:
    description: 'Path to the package directory'
    required: true
  python_version:
    description: 'Python version to use'
    required: false
    default: '3.12'
  extras:
    description: 'Comma-separated extras to install (e.g., "fastapi" installs -e .[fastapi])'
    required: false
    default: ''
  test_args:
    description: 'Additional arguments to pass to pytest'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Setup uv
      uses: ./.github/actions/setup-uv
      with:
        package_dir: ${{ inputs.package_dir }}
        python_version: ${{ inputs.python_version }}
        install_dependencies: 'false'

    - name: Install package (min deps)
      shell: bash
      working-directory: ${{ inputs.package_dir }}
      env:
        UV_NO_SOURCES: 1
        UV_NO_WORKSPACE: 1
        VIRTUAL_ENV: ${{ github.workspace }}/${{ inputs.package_dir }}/.venv
      run: |
        uv venv --clear
        # Inject lowest-direct resolution so uv lock resolves minimum versions
        # while still respecting constraint-dependencies from [tool.uv].
        sed -i 's/\[tool\.uv\]/&\nresolution = "lowest-direct"/' pyproject.toml

        EXTRA_ARGS=""
        for e in $(echo "${{ inputs.extras }}" | tr ',' ' '); do
          [ -n "$e" ] && EXTRA_ARGS="$EXTRA_ARGS --extra $e"
        done

        uv lock
        uv sync $EXTRA_ARGS

    - name: Install root dev tools
      shell: bash
      env:
        VIRTUAL_ENV: ${{ github.workspace }}/${{ inputs.package_dir }}/.venv
      run: |
        REPO_ROOT="${GITHUB_WORKSPACE:-$(git rev-parse --show-toplevel)}"
        uv export --directory "$REPO_ROOT" --frozen --only-group dev --no-hashes | uv pip install -r -

    - name: Run deptry
      shell: bash
      working-directory: ${{ inputs.package_dir }}
      env:
        UV_NO_WORKSPACE: 1
        VIRTUAL_ENV: ${{ github.workspace }}/${{ inputs.package_dir }}/.venv
      run: .venv/bin/deptry .

    - name: Run tests with min dependencies
      shell: bash
      working-directory: ${{ inputs.package_dir }}
      env:
        UV_NO_SOURCES: 1
        UV_NO_WORKSPACE: 1
        VIRTUAL_ENV: ${{ github.workspace }}/${{ inputs.package_dir }}/.venv
      run: .venv/bin/pytest ${{ inputs.test_args }}
