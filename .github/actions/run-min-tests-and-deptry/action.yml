name: 'Run Min Tests and Deptry'
description: 'Runs deptry and min-deps pytest tests using uv'

inputs:
  package_dir:
    description: 'Path to the package directory'
    required: true
  python_version:
    description: 'Python version to use'
    required: false
    default: '3.12'
  extras:
    description: 'Comma-separated extras to install (e.g., "fastapi" installs -e .[fastapi])'
    required: false
    default: ''
  test_args:
    description: 'Additional arguments to pass to pytest'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Setup uv
      uses: ./.github/actions/setup-uv
      with:
        package_dir: ${{ inputs.package_dir }}
        python_version: ${{ inputs.python_version }}
        install_dependencies: 'false'

    - name: Install package (min deps)
      shell: bash
      working-directory: ${{ inputs.package_dir }}
      env:
        VIRTUAL_ENV: ${{ github.workspace }}/${{ inputs.package_dir }}/.venv
      run: |
        # Use uv pip install instead of uv lock + uv sync because
        # UV_NO_WORKSPACE=1 does not prevent uv lock from checking workspace
        # members' requires-python, which fails when the CI matrix Python
        # (e.g. 3.11 for the SDK) is older than the workspace constraint (3.12).
        # uv pip install is fully workspace-agnostic.
        uv venv --python "${{ inputs.python_version }}"

        # Collect constraint-dependencies from all workspace members' pyproject.toml
        # files (not just the current package). This ensures transitive constraints
        # like lxml>=5.0.0 (defined in unique_toolkit) are applied even when
        # installing unique_mcp which depends on toolkit indirectly.
        REPO_ROOT="${GITHUB_WORKSPACE:-$(git rev-parse --show-toplevel)}"
        python3 -c "
        import tomllib, pathlib, sys
        seen = set()
        for p in pathlib.Path(sys.argv[1]).rglob('pyproject.toml'):
            if '.venv' in p.parts or 'tutorials' in p.parts:
                continue
            data = tomllib.loads(p.read_text())
            for dep in data.get('tool', {}).get('uv', {}).get('constraint-dependencies', []):
                if dep not in seen:
                    seen.add(dep)
                    print(dep)
        " "$REPO_ROOT" > /tmp/constraints.txt

        CONSTRAINT_ARGS=""
        if [ -s /tmp/constraints.txt ]; then
          CONSTRAINT_ARGS="--constraint /tmp/constraints.txt"
        fi

        EXTRAS=""
        for e in $(echo "${{ inputs.extras }}" | tr ',' ' '); do
          [ -n "$e" ] && EXTRAS="${EXTRAS:+$EXTRAS,}$e"
        done

        if [ -n "$EXTRAS" ]; then
          PKG_SPEC="-e .[$EXTRAS]"
        else
          PKG_SPEC="-e ."
        fi

        uv pip install $PKG_SPEC --resolution lowest-direct $CONSTRAINT_ARGS

    - name: Install dev tools
      shell: bash
      working-directory: ${{ inputs.package_dir }}
      env:
        VIRTUAL_ENV: ${{ github.workspace }}/${{ inputs.package_dir }}/.venv
      run: |
        REPO_ROOT="${GITHUB_WORKSPACE:-$(git rev-parse --show-toplevel)}"
        # Root dev group: pytest, ruff, deptry, etc.
        uv export --directory "$REPO_ROOT" --frozen --only-group dev --no-hashes | uv pip install -r -
        # Package-level dev group: package-specific test deps (e.g. responses for unique_six)
        uv export --frozen --only-group dev --no-hashes 2>/dev/null | uv pip install -r - 2>/dev/null || true

    - name: Run deptry
      shell: bash
      working-directory: ${{ inputs.package_dir }}
      env:
        VIRTUAL_ENV: ${{ github.workspace }}/${{ inputs.package_dir }}/.venv
      run: .venv/bin/deptry .

    - name: Run tests with min dependencies
      shell: bash
      working-directory: ${{ inputs.package_dir }}
      env:
        VIRTUAL_ENV: ${{ github.workspace }}/${{ inputs.package_dir }}/.venv
      run: .venv/bin/pytest ${{ inputs.test_args }}
