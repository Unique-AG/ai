name: 'Run Min Tests and Deptry'
description: 'Runs deptry and min-deps pytest tests using uv'

inputs:
  package_dir:
    description: 'Path to the package directory'
    required: true
  python_version:
    description: 'Python version to use'
    required: false
    default: '3.12'
  extras:
    description: 'Comma-separated extras to install (e.g., "fastapi" installs -e .[fastapi])'
    required: false
    default: ''
  test_args:
    description: 'Additional arguments to pass to pytest'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Setup uv
      uses: ./.github/actions/setup-uv
      with:
        package_dir: ${{ inputs.package_dir }}
        python_version: ${{ inputs.python_version }}

    - name: Install package (min deps)      shell: bash
      working-directory: ${{ inputs.package_dir }}
      env:
        UV_NO_SOURCES: 1
        UV_NO_WORKSPACE: 1
      run: |
        uv venv --clear
        EXTRAS="${{ inputs.extras }}"
        EXTRAS=$(echo "$EXTRAS" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
        EXTRAS="${EXTRAS// /}"
        PKG_SPEC="."
        if [ -n "$EXTRAS" ]; then
          PKG_SPEC=".[$EXTRAS]"
        fi
        uv pip install -e "$PKG_SPEC" --resolution=lowest-direct
        REPO_ROOT="${GITHUB_WORKSPACE:-$(git rev-parse --show-toplevel)}"
        uv export --directory "$REPO_ROOT" --only-group dev --no-hashes | uv pip install -r -
        uv export --only-group dev --no-hashes | uv pip install -r -

    - name: Run deptry
      shell: bash
      working-directory: ${{ inputs.package_dir }}
      run: uv run --no-sync deptry .

    - name: Run tests with min dependencies
      shell: bash
      working-directory: ${{ inputs.package_dir }}
      env:
        UV_NO_SOURCES: 1
      run: uv run --no-sync pytest ${{ inputs.test_args }}
