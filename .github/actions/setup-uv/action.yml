name: 'Setup uv'
description: 'Sets up Python and uv'

inputs:
  package_dir:
    description: 'Path to the package directory'
    required: true
  python_version:
    description: 'Python version to use'
    required: false
    default: '3.11'

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: ${{ inputs.python_version }}

    - name: Install uv
      shell: bash
      run: |
        curl -LsSf https://astral.sh/uv/0.10.8/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Print versions
      shell: bash
      run: |
        echo "Python version: $(python --version)"
        echo "uv version: $(uv --version)"

    - name: Install dependencies
      shell: bash
      run: |
        PKG_NAME=$(grep '^name' "${{ inputs.package_dir }}/pyproject.toml" | head -1 | sed 's/.*= *"\(.*\)"/\1/')
        echo "Syncing package: $PKG_NAME"
        # The workspace lockfile requires Python >=3.12. Packages tested on older
        # Python (e.g. unique_sdk on 3.11) must bypass --locked and install standalone.
        if python -c "import sys; exit(0 if sys.version_info >= (3, 12) else 1)"; then
          uv sync --locked --package "$PKG_NAME"
          uv sync --locked --inexact --only-dev
        else
          echo "Python $(python --version) is below workspace lockfile minimum (3.12); using standalone install"
          UV_NO_SOURCES=1 UV_NO_WORKSPACE=1 uv sync
          REPO_ROOT="${GITHUB_WORKSPACE:-$(git rev-parse --show-toplevel)}"
          uv export --directory "$REPO_ROOT" --only-group dev --no-hashes | uv pip install -r -
        fi

