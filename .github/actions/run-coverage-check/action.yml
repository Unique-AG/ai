name: 'Run Coverage Check'
description: 'Runs coverage check on new/changed code using uv'

inputs:
  package_dir:
    description: 'Path to the package directory'
    required: true
  python_version:
    description: 'Python version to use'
    required: false
    default: '3.11'
  base_ref:
    description: 'Base branch/ref for comparison'
    required: false
    default: ''
  min_coverage:
    description: 'Minimum coverage percentage'
    required: false
    default: '60'

runs:
  using: 'composite'
  steps:
    - name: Setup uv
      uses: ./.github/actions/setup-uv
      with:
        package_dir: ${{ inputs.package_dir }}
        python_version: ${{ inputs.python_version }}

    - name: Fetch base branch
      if: inputs.base_ref != ''
      shell: bash
      run: |
        BASE_BRANCH=$(echo "${{ inputs.base_ref }}" | sed 's|^origin/||')
        git fetch origin $BASE_BRANCH:$BASE_BRANCH

    - name: Check coverage on new/changed code
      shell: bash
      env:
        UV_NO_SOURCES: 1
      run: |
        ARGS=(
          "${{ inputs.package_dir }}"
          --min-coverage "${{ inputs.min_coverage }}"
          --runner "uv run"
        )
        if [ -n "${{ inputs.base_ref }}" ]; then
          ARGS+=(--base-ref "${{ inputs.base_ref }}")
        fi
        bash ${{ github.workspace }}/.github/scripts/check-coverage.sh "${ARGS[@]}"
