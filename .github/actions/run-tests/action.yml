name: 'Run Tests'
description: 'Runs pytest tests using uv'

inputs:
  package_dir:
    description: 'Path to the package directory'
    required: true
  python_version:
    description: 'Python version to use'
    required: false
    default: '3.11'
  install_args:
    description: 'Additional arguments for uv sync (e.g., --with fastapi)'
    required: false
    default: ''
  test_args:
    description: 'Additional arguments to pass to pytest'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Setup uv
      uses: ./.github/actions/setup-uv
      with:
        package_dir: ${{ inputs.package_dir }}
        python_version: ${{ inputs.python_version }}

    - name: Install extra dependencies
      if: inputs.install_args != ''
      shell: bash
      working-directory: ${{ inputs.package_dir }}
      run: uv sync --locked --inexact ${{ inputs.install_args }}

    - name: Run pytest
      shell: bash
      working-directory: ${{ inputs.package_dir }}
      env:
        UV_NO_SOURCES: 1
      run: uv run pytest ${{ inputs.test_args }}
