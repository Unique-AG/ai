name: 'Install Package Manager'
description: 'Detects the package manager (poetry/uv), installs Python + tools via mise, installs dependencies, and outputs run/install commands'

inputs:
  package_dir:
    description: 'Path to the package directory'
    required: true
  package_manager:
    description: 'Package manager to use: auto (detect from lock files), poetry, or uv'
    required: false
    default: 'auto'
  python_version:
    description: 'Python version to use'
    required: false
    default: '3.12'

outputs:
  run_cmd:
    description: 'Command prefix to run within the environment (poetry run / uv run)'
    value: ${{ steps.install.outputs.run_cmd }}
  install_cmd:
    description: 'Command to install dependencies (poetry install / uv sync --locked)'
    value: ${{ steps.install.outputs.install_cmd }}

runs:
  using: 'composite'
  steps:
    - name: Detect package manager
      id: detect
      shell: bash
      working-directory: ${{ inputs.package_dir }}
      run: |
        if [ "${{ inputs.package_manager }}" != "auto" ]; then
          echo "manager=${{ inputs.package_manager }}" >> $GITHUB_OUTPUT
        elif [ -f "poetry.lock" ]; then
          echo "manager=poetry" >> $GITHUB_OUTPUT
          echo "Detected: Poetry"
        elif [ -f "uv.lock" ]; then
          echo "manager=uv" >> $GITHUB_OUTPUT
          echo "Detected: uv"
        else
          echo "manager=poetry" >> $GITHUB_OUTPUT
          echo "No lock file found, defaulting to Poetry"
        fi

    # Installs the requested Python version plus Poetry and uv from .mise.toml.
    # tool_versions pins Python only; Poetry/uv versions come from the repo .mise.toml
    # so there is a single version source for those tools.
    - name: Install tools via mise
      uses: jdx/mise-action@v2
      with:
        tool_versions: |
          python ${{ inputs.python_version }}

    # Cache the virtualenv so parallel jobs (lint/test/types/coverage/deps) that run
    # against the same package share a warm environment across runs.
    # The key is stable as long as the lock file and Python version don't change.
    - name: Cache virtualenv
      id: cache-venv
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/pypoetry/virtualenvs
          ~/.cache/uv
          ${{ inputs.package_dir }}/.venv
        key: venv-${{ runner.os }}-py${{ inputs.python_version }}-${{ hashFiles(format('{0}/poetry.lock', inputs.package_dir), format('{0}/uv.lock', inputs.package_dir)) }}
        restore-keys: |
          venv-${{ runner.os }}-py${{ inputs.python_version }}-

    - name: Install dependencies (poetry)
      if: steps.detect.outputs.manager == 'poetry' && steps.cache-venv.outputs.cache-hit != 'true'
      shell: bash
      working-directory: ${{ inputs.package_dir }}
      run: poetry install

    - name: Install dependencies (uv)
      if: steps.detect.outputs.manager == 'uv' && steps.cache-venv.outputs.cache-hit != 'true'
      shell: bash
      working-directory: ${{ inputs.package_dir }}
      run: uv sync --locked

    - name: Set outputs
      id: install
      shell: bash
      run: |
        if [ "${{ steps.detect.outputs.manager }}" = "poetry" ]; then
          echo "run_cmd=poetry run" >> $GITHUB_OUTPUT
          echo "install_cmd=poetry install" >> $GITHUB_OUTPUT
        else
          echo "run_cmd=uv run" >> $GITHUB_OUTPUT
          echo "install_cmd=uv sync --locked" >> $GITHUB_OUTPUT
        fi
