name: 'Install Package Manager'
description: 'Installs uv and returns the run_cmd and install_cmd outputs'

inputs:
  package_dir:
    description: 'Path to the package directory'
    required: true
  package_manager:
    description: 'Package manager to use (kept for interface compatibility, always uv)'
    required: false
    default: 'uv'
  python_version:
    description: 'Python version to use'
    required: false
    default: '3.11'
  package_manager_version:
    description: 'Unused, kept for interface compatibility'
    required: false
    default: ''

outputs:
  run_cmd:
    description: 'Command prefix for running tools (uv run)'
    value: ${{ steps.install.outputs.run_cmd }}
  install_cmd:
    description: 'Command for installing dependencies (uv sync --locked)'
    value: ${{ steps.install.outputs.install_cmd }}

runs:
  using: 'composite'
  steps:
    - name: Setup uv
      uses: ./.github/actions/setup-uv
      with:
        package_dir: ${{ inputs.package_dir }}
        python_version: ${{ inputs.python_version }}

    - name: Set run_cmd and install_cmd outputs
      id: install
      shell: bash
      run: |
        echo "run_cmd=uv run" >> $GITHUB_OUTPUT
        echo "install_cmd=uv sync --locked" >> $GITHUB_OUTPUT
