name: 'Detect Package Manager'
description: 'Returns uv as the package manager (all packages use uv)'

inputs:
  package_dir:
    description: 'Path to the package directory'
    required: true

outputs:
  package_manager:
    description: 'Detected package manager: uv'
    value: ${{ steps.detect.outputs.manager }}

runs:
  using: 'composite'
  steps:
    - name: Detect package manager
      id: detect
      shell: bash
      run: |
        echo "manager=uv" >> $GITHUB_OUTPUT
        echo "Detected: uv"
