# Keeps GitHub Actions used in workflows and composite actions up to date.
# Dependabot preserves the existing SHA-pin + version-comment style enforced
# by .github/workflows/github.policies.verify.pinned-actions.yaml.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
    open-pull-requests-limit: 5
    # 2-week stability window: skip releases newer than this. github-actions is
    # not semver-graded by Dependabot, so default-days governs all bumps.
    cooldown:
      default-days: 14
    commit-message:
      prefix: chore(deps)
    labels:
      - dependencies
      - github-actions
    groups:
      github-actions:
        patterns:
          - "*"
