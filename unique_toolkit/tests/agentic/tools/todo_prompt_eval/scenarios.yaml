    Tests whether the model creates todos for all 50, processes
    every single one without summarizing or skipping, and maintains
    consistent tracking across a very long execution.
  user_message: >
    I need a one-sentence competitive summary for each of these 50
    SaaS companies. For each one, search the web and write a brief
    description of what they do and their estimated ARR. Compile
    everything into a single document at the end.

