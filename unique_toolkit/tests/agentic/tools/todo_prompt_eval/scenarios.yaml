- id: batch_100_db_audit
  description: >
    Maximum stress test: audit 100 database records. The model may
    ask for clarification first (e.g. about certification fields) —
    that's fine and expected for such a large task. A follow-up
    provides the answers. The key test is whether it then processes
    all 100 vendors without giving up, skipping, or summarizing.
    The model may batch into coarser-grained todos — that's acceptable
    as long as all vendors are processed.
  user_message: >
    We need to audit all 100 vendor records in our database for compliance.
    For each vendor ID below, look them up in the vendors database table,
    check if they have a valid certification, and if the certification is
    missing or expired, send an email to the vendor's contact address
    requesting updated documentation. Track every single vendor — do not
    skip any.

    Vendor IDs: V001, V002, V003, V004, V005, V006, V007, V008, V009, V010,
    V011, V012, V013, V014, V015, V016, V017, V018, V019, V020,
    V021, V022, V023, V024, V025, V026, V027, V028, V029, V030,
    V031, V032, V033, V034, V035, V036, V037, V038, V039, V040,
    V041, V042, V043, V044, V045, V046, V047, V048, V049, V050,
    V051, V052, V053, V054, V055, V056, V057, V058, V059, V060,
    V061, V062, V063, V064, V065, V066, V067, V068, V069, V070,
    V071, V072, V073, V074, V075, V076, V077, V078, V079, V080,
    V081, V082, V083, V084, V085, V086, V087, V088, V089, V090,
    V091, V092, V093, V094, V095, V096, V097, V098, V099, V100
  followup_messages:
    - >
      Good questions. Here are the answers:
      - The certification field is called "compliance_cert_status" — values
        are "valid", "expired", or "missing".
      - If status is "expired" or "missing", email the vendor's "contact_email"
        field with subject "Compliance certification update required" and a
        polite request for updated documentation.
      - Use a standard professional tone, no special template needed.
      Now please proceed with all 100 vendors.
  max_turns: 500
  expected:
    should_use_todos: true
    min_todo_items: 10
    should_complete_all: true
    should_not_ask_mid_execution: true
