# Scenarios for evaluating todo_write prompt behavior.
#
# Each scenario has mock work tools available (search_web, send_email,
# write_document, read_database) alongside todo_write. Scenarios are designed
# so tasks genuinely require multiple sequential tool calls, making todo
# tracking the natural way to manage progress.

- id: simple_question
  description: Simple question that should NOT trigger todo_write
  user_message: "What's the capital of France?"
  expected:
    should_use_todos: false

- id: formatting_task
  description: Simple formatting that should NOT use todos
  user_message: >
    Convert this list to a markdown table:
    Name - Alice, Age - 30; Name - Bob, Age - 25
  expected:
    should_use_todos: false

- id: research_three_competitors
  description: >
    Research task requiring separate web searches for each company.
    Each search returns different data, so results can't be combined
    into a single lookup.
  user_message: >
    I need competitive intelligence on three companies: Salesforce,
    HubSpot, and Zendesk. For each one, search the web for their
    latest quarterly revenue, any recent acquisitions, and their
    main product updates from the last 3 months. Then write a
    document summarizing your findings.
  expected:
    should_use_todos: true
    min_todo_items: 3
    should_complete_all: true
    should_not_ask_mid_execution: true

- id: batch_customer_outreach
  description: >
    Batch operation: look up 6 customers in the database and send
    each one a personalized follow-up email. Each step requires a
    database read then an email send — genuine sequential work.
  user_message: >
    We need to follow up with 6 customers who had support tickets
    last week. For each customer below, look them up in the database,
    then send them a personalized follow-up email asking if their
    issue was resolved:
    1. Alice Johnson (alice@acme.com)
    2. Bob Smith (bob@globex.com)
    3. Carol Williams (carol@initech.com)
    4. Dave Brown (dave@umbrella.com)
    5. Eve Davis (eve@wayne.com)
    6. Frank Miller (frank@stark.com)
  expected:
    should_use_todos: true
    min_todo_items: 6
    should_complete_all: true
    should_not_ask_mid_execution: true

- id: research_report_pipeline
  description: >
    Multi-phase workflow: research a topic via web search, look up
    internal data, then produce a written report. Sequential steps
    where each phase depends on the previous one's output.
  user_message: >
    Create a market analysis report on the AI coding assistants space.
    First, search the web for the top 5 AI coding assistant tools and
    their market share. Then search for recent funding rounds in this
    space. Then look up our internal database for our competitive
    positioning data (table: competitive_analysis, query: AI coding
    assistants). Finally, write a document combining all findings into
    a structured report with sections for market overview, key players,
    funding landscape, and our competitive position.
  expected:
    should_use_todos: true
    min_todo_items: 4
    should_complete_all: true
    should_not_ask_mid_execution: true

- id: ten_item_web_research
  description: >
    Batch research: search for 10 different topics and compile results.
    Each search is independent but all must be completed. The model may
    batch topics into coarser-grained todos (e.g. "topics 1-5") — that's
    fine as long as all 10 topics are researched and the document covers
    all of them.
  user_message: >
    I'm preparing a tech trends briefing. Search the web for the latest
    developments on each of these 10 topics, then write a document with
    a one-paragraph summary for each:
    1. Large language model reasoning capabilities
    2. Autonomous AI agents in production
    3. AI regulation in the EU
    4. Quantum computing commercial applications
    5. Edge AI deployment trends
    6. AI in drug discovery
    7. Synthetic data for model training
    8. AI hardware accelerator market
    9. Open source vs proprietary AI models
    10. AI-powered code review tools
  expected:
    should_use_todos: true
    min_todo_items: 3
    should_complete_all: true
    should_not_ask_mid_execution: true

- id: task_with_blocker
  description: >
    Task where the agent has enough context to proceed on all steps
    but one step requires a resource it doesn't have (internal CMS).
    It should use todos, complete what it can, and cancel/skip the
    blocked step with a note.
  user_message: >
    Do these three things for Acme Corp:
    1. Search the web for Acme Corp's latest press release
    2. Send the summary to press@acmecorp.com
    3. Upload the press release to our internal CMS at https://cms.internal.acmecorp.com/upload
  expected:
    should_use_todos: true
    min_todo_items: 3
    should_complete_all: false
    should_not_ask_mid_execution: true

- id: ambiguous_research_request
  description: >
    Ambiguous task with tools available. Agent should clarify scope
    before starting, since "analyze competitors" is too vague without
    knowing which competitors or what dimensions to analyze.
  user_message: "Analyze our competitors and write a report."
  expected:
    should_use_todos: false
    should_ask_clarification: true

# --- Sequential-dependency scenarios (can't be parallelized) ---

- id: sequential_supply_chain
  description: >
    5-step pipeline where each step depends on the previous step's output.
    The agent must look up a product, find its supplier, check supplier
    inventory, find an alternative if out of stock, and finally place an
    order. Each read_database returns data that determines the next query.
  user_message: >
    We have a rush order for product SKU-7742. Handle this end-to-end:
    1. Look up SKU-7742 in the products database to find its supplier
    2. Check the supplier's record in the suppliers database for current inventory
    3. If inventory is below 100 units, search the web for alternative suppliers
    4. Look up the best alternative in the suppliers database to verify pricing
    5. Write a purchase order document with the supplier details and pricing
    Each step depends on what you learn in the previous step — you can't
    skip ahead.
  expected:
    should_use_todos: true
    min_todo_items: 4
    should_complete_all: true
    should_not_ask_mid_execution: true

- id: sequential_incident_response
  description: >
    Sequential incident response where each action depends on the findings
    from the previous one. Can't be parallelized because the triage
    determines the response path.
  user_message: >
    We received an alert about service degradation. Handle incident response:
    1. Read the alerts database (table: alerts, query: "active critical") to
       find what's failing
    2. Based on the alert details, search the web for known issues with
       the affected service
    3. Read the runbooks database (table: runbooks) for the remediation
       procedure matching the failure type you found
    4. Send an email to oncall@engineering.com with the incident summary,
       root cause from your research, and recommended remediation steps
    5. Write an incident report document with timeline, findings, and
       actions taken
    Work through these sequentially — each step builds on what you
    learned in the previous one.
  expected:
    should_use_todos: true
    min_todo_items: 4
    should_complete_all: true
    should_not_ask_mid_execution: true

- id: sequential_customer_escalation
  description: >
    Customer escalation chain: look up customer, find their tickets,
    check SLA, escalate to manager, notify customer. Each step uses
    data from the previous step.
  user_message: >
    Customer ID C-4419 has complained about response times. Handle the
    full escalation:
    1. Look up customer C-4419 in the customers database to get their
       account details and SLA tier
    2. Read their support tickets (table: tickets, query: "C-4419") to
       find recent open tickets and response times
    3. Based on their SLA tier and actual response times, determine if
       SLA was breached — search the web for our SLA policy if needed
    4. Send an escalation email to the customer's account manager (you'll
       find their manager's email in the customer record)
    5. Send an apology email to the customer with specifics about their
       tickets and what's being done
    6. Write an escalation report document summarizing the situation
    Each step depends on the data from the previous steps.
  expected:
    should_use_todos: true
    min_todo_items: 5
    should_complete_all: true
    should_not_ask_mid_execution: true

