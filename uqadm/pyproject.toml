[project]
name = "uqadm"
version = "0.1.0"
description = "Unique admin CLI (space list, export, upsert, migrate, delete): separate from unique-cli"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "unique-sdk>=2026.20.0.dev8",
    "click>=8.1.0,<9",
    "python-dotenv>=1.0.0,<2",
    "pyyaml>=6.0,<7",
    "rich>=13.7,<15",
]

[project.scripts]
uqadm = "uqadm.cli:main"

[build-system]
requires = ["uv_build>=0.8.14,<0.9.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-root = ""

[tool.ruff]
target-version = "py311"

[tool.ruff.lint]
extend-select = ["I"]

[tool.pytest.ini_options]
testpaths = ["tests"]
