repos:
- repo: local
  hooks:
    - id: check-commit-message
      name: Validate commit message (conventional commits)
      language: script
      entry: .githooks/check-commit-message.sh
      stages: [commit-msg]
      always_run: true
      pass_filenames: false

    - id: check-branch-name
      name: Validate branch name (Jira ticket required)
      language: script
      entry: .githooks/check-branch-name.sh
      stages: [pre-push]
      always_run: true
      pass_filenames: false

- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.12.10
  hooks:
    # Run the linter.
    - id: ruff
      args: [ --fix ]
      exclude: ^unique_toolkit/docs/\.python_files/.*|^unique_toolkit/docs/examples_from_docs/.*
    # Sort imports
    - id: ruff
      args: ["check", "--select", "I", "--fix"]
      exclude: ^unique_toolkit/docs/\.python_files/.*|^unique_toolkit/docs/examples_from_docs/.*
    # Run the formatter.
    - id: ruff-format
      exclude: ^unique_toolkit/docs/\.python_files/.*|^unique_toolkit/docs/examples_from_docs/.*