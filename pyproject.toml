[project]
name = "unique-ai-workspace"
version = "0.1.0"
description = "Unique AI monorepo workspace"
requires-python = ">=3.11"
dependencies = [
    # Common dependencies shared across workspace packages
    "typing-extensions>=4.9.0",
    "pydantic>=2.8.2", 
    "pydantic-settings>=2.10.1",
    "python-dotenv>=1.0.1",
]

[project.optional-dependencies]
dev = [
    # Linting and formatting
    "ruff>=0.12.10",
    
    # Testing
    "pytest>=8.4.1",
    "pytest-cov>=4.1.0",
    "pytest-asyncio>=0.24.0",
    "pytest-mock>=3.14.0",
    
    # Type checking
    "pyright>=1.1.341",
    
    # Development tools
    "tox>=4.11.4",
    "pre-commit>=3.7.1",
    "python-dotenv>=1.1.0",
    "ipykernel>=6.29.5",
]

[tool.uv.workspace]
members = [
    "unique_sdk",
    "unique_toolkit", 
    "unique_stock_ticker",
    "unique_follow_up_questions",
    "tool_packages/*"
]
exclude = [
    "tutorials/*",
    "unique_client"
]

[tool.uv.sources]
# Workspace sources for internal dependencies
unique-sdk = { workspace = true }
unique-toolkit = { workspace = true }
unique-stock-ticker = { workspace = true }
unique-follow-up-questions = { workspace = true }
unique-web-search = { workspace = true }
unique-internal-search = { workspace = true }

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"
