[project]
name = "ai-monorepo"
version = "0.1.1"
description = "AI Monorepo Documentation"
authors = [{ name = "Unique Team" }]
readme = "README.md"
license = "Proprietary"
requires-python = ">=3.11"
dependencies = [
    "unique-toolkit",
    "griffe-pydantic>=1.1.8",
]

[dependency-groups]
dev = [
    # type checking / linting
    "pyright>=1.1.405",
    "ruff>=0.14.2",
    "basedpyright>=1.35.0,<2",
    "langchain>=1.1.0",
    # shared test tools (used across all workspace packages)
    "pytest>=8.4.1,<9",
    "pytest-asyncio>=0.25.0",
    "pytest-cov>=7.0.0,<8",
    "pytest-mock>=3.14.0,<4",
    "deptry>=0.24.0,<0.25",
    "poethepoet>=0.32.0,<0.33",
    # migrated from per-package dev groups
    "python-dotenv>=1.1.0,<2",
    "openai>=1.105.0,<3",
    "isort>=6.0.1,<7",
    "opik>=1.8.42,<2",
]
docs = [
    "mkdocs>=1.6.1",
    "mkdocs-material>=9.6.11",
    "mkdocs-monorepo-plugin>=1.1.2",
    "mkdocs-include-markdown-plugin>=7.1.8",
    "mkdocs-callouts>=1.16.0",
    "mkdocstrings-python>=1.16.10",
    "entangled-cli>=2.1.13",
    "mkdocs-entangled-plugin>=0.4.0",
    "mkdocs-codeinclude-plugin>=0.2.1",
    "mkdocs-include-dir-to-nav>=1.2.0",
    "mike>=2.1.3",
]

[tool.uv]
exclude-newer = "2 weeks"
constraint-dependencies = [
    "aiohttp>=3.13.4",
    "copier>=9.14.1",
    "cryptography>=46.0.7",
    "deepdiff>=8.6.2",
    "fastmcp>=3.2.0",
    "langchain-core>=1.2.28",
    "litellm>=1.83.0",
    "requests>=2.33.0",
]

[tool.uv.exclude-newer-package]
"unique-toolkit" = false
# Temporary overrides: the constraint-dependencies above enforce security floors
# that are too recent for the 2-week exclude-newer window on some Python version
# splits. Remove these once the constrained versions are older than 2 weeks.
aiohttp = "2026-04-08"
copier = "2026-04-09"
cryptography = "2026-04-08"
deepdiff = "2026-04-08"
fastmcp = "2026-04-08"
langchain-core = "2026-04-09"
litellm = "2026-04-09"
openai = "2026-04-09"
requests = "2026-04-08"

[tool.uv.sources]
unique-toolkit = { workspace = true }

[tool.uv.workspace]
members = [
    "unique_sdk",
    "unique_toolkit",
    "unique_mcp",
    "unique_orchestrator",
    "tool_packages/*",
    "postprocessors/*",
    "connectors/*",
    "tutorials/mcp/mcp_test",
]
