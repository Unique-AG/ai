[project]
name = "market-vendor"
version = "0.1.0"
description = ""
authors = []
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "flask>=3.0.2",
    "python-dotenv>=1.0.1",
    "requests>=2.31.0",
    "unique-sdk>=0.9.4",
    "gunicorn>=23.0.0",
    "unique-toolkit>=0.6.8",
]

[dependency-groups]
dev = [
    "pytest==8.3.5",
    "pytest-cov==6.1.1",
    "ruff>=0.2.1",
    "sseclient==0.0.27",
]

[project.scripts]
start = "market_vendor:app.run"

[build-system]
requires = ["uv_build>=0.8.14,<0.9.0"]
build-backend = "uv_build"

[tool.uv]
exclude-newer = "2 weeks"
exclude-newer-package = {
    "unique-sdk" = false,
    "unique-toolkit" = false,
}
