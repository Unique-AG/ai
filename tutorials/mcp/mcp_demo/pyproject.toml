[project]
name = "mcp-demo"
version = "0.1.1"
description = "Add your description here"
readme = "README.md"
authors = [{ name = "Cedric Klinkert", email = "cedric@unique.ch" }]
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.120.2",
    "fastmcp>=3.1.1,<4",
    "pydantic>=2.12.3",
]

[project.scripts]
mcp-demo = "mcp_demo.mcp_demo_server:main"

[build-system]
requires = ["uv_build>=0.8.14,<0.9.0"]
build-backend = "uv_build"

[tool.uv]
exclude-newer = "2 weeks"
