[project]
name = "mcp-search"
version = "0.1.2"
description = "Add your description here"
readme = "README.md"
authors = [{ name = "Cedric Klinkert", email = "cedric@unique.ch" }]
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.120.2",
    "fastmcp>=3.1.1,<4",
    "pydantic>=2.12.3",
    "unique-mcp>=0.2.0",
    "unique-toolkit>=1.61.0",
]

[tool.uv.sources]
unique-mcp = { path = "../../../unique_mcp", editable = true }
unique-toolkit = { path = "../../../unique_toolkit", editable = true }

[project.scripts]
mcp-search = "mcp_search.mcp_search_server:main"

[build-system]
requires = ["uv_build>=0.8.14,<0.9.0"]
build-backend = "uv_build"

[tool.pytest.ini_options]
asyncio_mode = "auto"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=0.25.0",
]

[tool.uv]
exclude-newer = "2 weeks"

[tool.uv.exclude-newer-package]
"unique-mcp" = false
"unique-toolkit" = false

