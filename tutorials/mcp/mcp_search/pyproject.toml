[project]
name = "mcp-search"
version = "0.1.3"
description = "Add your description here"
readme = "README.md"
authors = [{ name = "Cedric Klinkert", email = "cedric@unique.ch" }]
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.120.2",
    "fastmcp>=3.2.0,<4",
    "pydantic>=2.12.3",
    # dev floor: depends on unique_mcp's async identity resolver, added in
    # #2123. The wheel containing it is the first dev build cd-publish-dev
    # publishes once that PR merges to main. Bump to the next stable once
    # released.
    "unique-mcp>=2026.32.0",
    # Match unique-mcp's published floor (unique-toolkit>=2026.32.0.dev2).
    "unique-toolkit>=2026.32.0",
    # Transitive of unique-toolkit; explicit .devN pin so uv's
    # if-necessary-or-explicit prerelease mode picks it up in ACR builds.
    "unique-sdk>=2026.32.0",
]

[tool.uv.sources]
unique-mcp = { path = "../../../unique_mcp", editable = true }
unique-toolkit = { path = "../../../unique_toolkit", editable = true }

[project.scripts]
mcp-search = "mcp_search.mcp_search_server:main"

[build-system]
requires = ["uv_build>=0.8.14,<0.9.0"]
build-backend = "uv_build"

[tool.pytest.ini_options]
addopts = "--strict-markers --import-mode=importlib"
asyncio_mode = "auto"
markers = [
    "ai: AI-authored or AI-generated tests",
    "asyncio: asyncio tests",
    "integration: integration tests that require API access or credentials",
    "serial: tests that must run serially",
    "unit: unit tests",
    "verified: AI-generated tests with human verification",
]
filterwarnings = [
    "ignore::DeprecationWarning",
]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=0.25.0",
]

[tool.uv]
exclude-newer = "2 weeks"
constraint-dependencies = [
    "aiohttp>=3.13.4",
    "authlib>=1.6.11",
    "cryptography>=46.0.7",
    "pillow>=12.2.0",
    "pygments>=2.20.0",
    "pytest>=9.0.3",
    "python-multipart>=0.0.27",
    "requests>=2.33.0",
    "urllib3>=2.7.0",
]

[tool.uv.exclude-newer-package]
"unique-mcp" = false
"unique-toolkit" = false
# unique-sdk is a hard dependency of unique-toolkit; without this exemption the
# resolver falls back to an outdated unique-toolkit when building from PyPI.
"unique-sdk" = false
# urllib3 2.7.0 (GHSA-48p4-8xcf-vxj5) uploaded 2026-05-07; remove after 2026-05-22.
"urllib3" = "2026-05-08"
