[project]
name = "mcp-sql-demo"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [{ name = "Cedric Klinkert", email = "cedric@unique.ch" }]
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.120.2",
    "fastmcp>=3.1.1,<4",
    "psycopg2-binary>=2.9.11",
    "pydantic>=2.12.3",
    "unique-mcp",
    "unique-toolkit>=1.61.0",
]

[tool.uv.sources]
unique-mcp = { path = "../../../unique_mcp", editable = true }
unique-toolkit = { path = "../../../unique_toolkit", editable = true }

[project.scripts]
mcp-sql-demo = "mcp_sql_demo.mcp_sql_demo:main"

[build-system]
requires = ["uv_build>=0.8.14,<0.9.0"]
build-backend = "uv_build"
