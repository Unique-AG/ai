[project]
name = "mcp-sql-demo"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [{ name = "Cedric Klinkert", email = "cedric@unique.ch" }]
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.120.2",
    "fastmcp>=2.13.0.2",
    "psycopg2-binary>=2.9.11",
    "pydantic>=2.12.3",
    "unique-toolkit>=1.20.0",
]

[project.scripts]
unique-mcp = "unique_mcp:main"

[dependency-groups]
dev = [
    "ruff>=0.14.8",
    "pytest>=8.0.0",
    "basedpyright>=1.33.0",
    "deptry>=0.24.0",
]

[build-system]
requires = ["uv_build>=0.8.14,<0.9.0"]
build-backend = "uv_build"

[tool.ruff.lint]
select = ["E"]

[tool.basedpyright]
typeCheckingMode = "standard"

[tool.deptry]
known_first_party = ["mcp_sql_demo"]
