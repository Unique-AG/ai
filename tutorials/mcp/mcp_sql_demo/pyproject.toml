[project]
name = "mcp-sql-demo"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [{ name = "Cedric Klinkert", email = "cedric@unique.ch" }]
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.120.2",
    "fastmcp>=2.13.0.2",
    "psycopg2-binary>=2.9.11",
    "py-key-value-aio[postgresql]>=0.4.0",
    "pydantic>=2.12.3",
    "python-dotenv>=1.0.0",
    "requests>=2.28.0",
    "unique-toolkit>=1.20.0",
]

[project.scripts]
unique-mcp = "unique_mcp:main"

[dependency-groups]
dev = [
    "ruff>=0.14.8",
    "deptry>=0.24.0",
]

[build-system]
requires = ["uv_build>=0.8.14,<0.9.0"]
build-backend = "uv_build"

[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["E"]
per-file-ignores = { "src/mcp_sql_demo/db_tool_pm/prompts.py" = ["E501"], "src/mcp_sql_demo/db_tool_pm/service.py" = ["E501"], "src/mcp_sql_demo/mcp_sql_demo.py" = ["E501"] }

[tool.deptry]
known_first_party = ["mcp_sql_demo", "db_tool_pm"]
ignore = ["DEP003"]
