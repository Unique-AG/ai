[project]
name = "mcp-resource-sharing"
version = "0.1.0"
description = "Cross-IdP MCP resource pipeline demo (Dex + Keycloak token exchange)"
readme = "README.md"
authors = [{ name = "Cedric Klinkert", email = "cedric@unique.ch" }]
requires-python = ">=3.12"
dependencies = [
    "fastmcp>=3.1.1,<4",
    "httpx>=0.28.0",
    "pydantic>=2.12.3",
    "pydantic-settings>=2.13.0",
]

[project.scripts]
mcp-resource-producer = "mcp_resource_sharing.producer.server:main"
mcp-resource-consumer = "mcp_resource_sharing.consumer.server:main"
mcp-resource-demo = "mcp_resource_sharing.demo.run_demo:main"

[build-system]
requires = ["uv_build>=0.8.14,<0.9.0"]
build-backend = "uv_build"

[tool.uv]
exclude-newer = "2 weeks"

[tool.uv.build-backend]
module-name = "mcp_resource_sharing"
module-root = "src"
