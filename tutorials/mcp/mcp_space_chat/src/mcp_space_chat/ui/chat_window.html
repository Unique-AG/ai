<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Unique Space Chat</title>
<!-- VENDOR_SCRIPTS -->
<style>
  /* Unique chat visual language: white surface, near-black text, plain
     assistant paragraphs, dark rounded user bubbles, subtle chrome. */
  :root {
    --uq-bg: #ffffff;
    --uq-text: #1a1a1a;
    --uq-muted: #737373;
    --uq-border: #e8e8e8;
    --uq-user-bg: #18181b;
    --uq-user-fg: #fafafa;
    --uq-accent: #0369a1;
    --uq-chip-bg: #f4f4f5;
    --uq-chip-border: #e4e4e7;
    --uq-code-bg: #f6f6f7;
    --font-sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI",
      "Helvetica Neue", Arial, sans-serif;
    --font-mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas,
      monospace;
  }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--uq-bg);
    color: var(--uq-text);
    font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased;
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    min-height: 0;
    border: 1px solid var(--uq-border);
    border-radius: 12px;
    overflow: hidden;
    box-sizing: border-box;
    background: var(--uq-bg);
  }

  /* ── Header ──────────────────────────────────────────────────────────── */
  #toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 14px;
    border-bottom: 1px solid var(--uq-border);
    background: var(--uq-bg);
    flex: 0 0 auto;
  }
  #toolbar .title {
    font-weight: 600;
    font-size: 13px;
    letter-spacing: -0.01em;
  }
  #toolbar .spacer { flex: 1; }
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--uq-muted);
  }
  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #a1a1aa;
    flex: 0 0 auto;
  }
  .status-dot.streaming {
    background: #0d9488;
    animation: pulse 1.1s ease-in-out infinite;
  }
  .status-dot.idle { background: #16a34a; }
  .status-dot.error { background: #dc2626; }
  #toolbar button {
    border: 1px solid var(--uq-chip-border);
    background: var(--uq-bg);
    color: var(--uq-text);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
  }
  #toolbar button:hover { background: var(--uq-chip-bg); }

  /* ── Frame / panel host ──────────────────────────────────────────────── */
  #frame-host {
    flex: 1 1 auto;
    min-height: 0;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  #frame-host > iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }
  #placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-align: center;
    padding: 24px;
    font-size: 14px;
    color: var(--uq-muted);
  }
  #placeholder .spinner {
    width: 22px;
    height: 22px;
    border: 3px solid var(--uq-border);
    border-top-color: var(--uq-muted);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }

  /* ── Native chat panel (fallback) ────────────────────────────────────── */
  #chat-panel {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  #messages {
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    padding: 20px 0 24px;
    scroll-behavior: smooth;
  }
  .msg-inner {
    max-width: 820px;
    margin: 0 auto;
    padding: 0 24px;
    box-sizing: border-box;
  }
  .msg {
    margin-bottom: 20px;
  }
  /* User: dark rounded bubble on the right, like Unique. */
  .msg.user .msg-inner {
    display: flex;
    justify-content: flex-end;
  }
  .msg.user .bubble {
    background: var(--uq-user-bg);
    color: var(--uq-user-fg);
    border-radius: 18px;
    padding: 10px 16px;
    font-size: 14.5px;
    line-height: 1.5;
    max-width: 78%;
    white-space: pre-wrap;
    word-break: break-word;
  }
  /* Assistant: plain full-width prose, no bubble. */
  .msg.assistant .md {
    font-size: 14.5px;
    line-height: 1.65;
    word-break: break-word;
  }

  /* Markdown prose — mirrors Unique's rendering. */
  .md > :first-child { margin-top: 0; }
  .md > :last-child { margin-bottom: 0; }
  .md p { margin: 0.7em 0; }
  .md h1, .md h2, .md h3, .md h4 {
    margin: 1.1em 0 0.45em;
    line-height: 1.3;
    letter-spacing: -0.01em;
    font-weight: 650;
  }
  .md h1 { font-size: 1.32em; }
  .md h2 { font-size: 1.18em; }
  .md h3 { font-size: 1.06em; }
  .md h4 { font-size: 1em; }
  .md ul, .md ol { margin: 0.5em 0; padding-left: 1.45em; }
  .md li { margin: 0.22em 0; }
  .md blockquote {
    margin: 0.7em 0;
    padding: 2px 0 2px 14px;
    border-left: 3px solid var(--uq-border);
    color: var(--uq-muted);
  }
  .md hr {
    border: 0;
    border-top: 1px solid var(--uq-border);
    margin: 1.1em 0;
  }
  .md a { color: var(--uq-accent); text-decoration: none; }
  .md a:hover { text-decoration: underline; }
  .md code {
    font-family: var(--font-mono);
    font-size: 0.88em;
    background: var(--uq-chip-bg);
    border: 1px solid var(--uq-chip-border);
    padding: 1px 5px;
    border-radius: 5px;
  }
  .md pre {
    position: relative;
    background: var(--uq-code-bg);
    border: 1px solid var(--uq-border);
    border-radius: 10px;
    padding: 12px 14px;
    overflow-x: auto;
    margin: 0.8em 0;
  }
  .md pre code {
    background: transparent;
    border: 0;
    padding: 0;
    font-size: 12.5px;
    line-height: 1.55;
  }
  .md pre .copy-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    border: 1px solid var(--uq-chip-border);
    background: var(--uq-bg);
    color: var(--uq-muted);
    border-radius: 6px;
    font-size: 11px;
    padding: 2px 8px;
    cursor: pointer;
  }
  .md pre .copy-btn:hover { color: var(--uq-text); }
  .md table {
    border-collapse: collapse;
    width: 100%;
    font-size: 13.5px;
    margin: 0.8em 0;
    display: block;
    overflow-x: auto;
  }
  .md th, .md td {
    border: 1px solid var(--uq-border);
    padding: 7px 10px;
    text-align: left;
    vertical-align: top;
  }
  .md th {
    background: var(--uq-chip-bg);
    font-weight: 600;
  }
  .md img { max-width: 100%; border-radius: 8px; }

  /* Thinking / collapsible sections (details blocks in message text). */
  .md details {
    margin: 0.7em 0;
    border: 1px solid var(--uq-border);
    border-radius: 10px;
    padding: 0;
    background: #fcfcfc;
    overflow: hidden;
  }
  .md details summary {
    cursor: pointer;
    padding: 9px 14px;
    font-size: 13px;
    color: var(--uq-muted);
    font-weight: 500;
    list-style: none;
    display: flex;
    align-items: center;
    gap: 8px;
    user-select: none;
  }
  .md details summary::-webkit-details-marker { display: none; }
  .md details summary::before {
    content: "";
    width: 6px;
    height: 6px;
    border-right: 1.5px solid var(--uq-muted);
    border-bottom: 1.5px solid var(--uq-muted);
    transform: rotate(-45deg);
    transition: transform 0.15s ease;
    flex: 0 0 auto;
  }
  .md details[open] summary::before { transform: rotate(45deg); }
  .md details > :not(summary) {
    margin-left: 14px;
    margin-right: 14px;
  }
  .md details > *:nth-child(2) { margin-top: 8px; }
  .md details > :last-child { margin-bottom: 12px; }
  .md details i, .md details em {
    color: var(--uq-muted);
    font-style: normal;
    font-size: 13.5px;
  }

  /* Citation superscripts bound to references (Unique style). */
  sup.cite {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 16px;
    height: 16px;
    padding: 0 4px;
    margin: 0 1px;
    border-radius: 8px;
    background: var(--uq-chip-bg);
    border: 1px solid var(--uq-chip-border);
    color: var(--uq-accent);
    font-size: 10.5px;
    font-weight: 600;
    line-height: 1;
    vertical-align: super;
    cursor: pointer;
    user-select: none;
  }
  sup.cite:hover { background: #e0f2fe; border-color: #bae6fd; }

  /* References row under a message. */
  .refs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }
  .ref-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    border: 1px solid var(--uq-chip-border);
    background: var(--uq-chip-bg);
    color: var(--uq-text);
    border-radius: 999px;
    padding: 3px 10px;
    font-size: 12px;
    text-decoration: none;
    cursor: pointer;
    max-width: 260px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .ref-chip:hover { background: #ececee; }
  .ref-chip .n { color: var(--uq-accent); font-weight: 600; }

  /* File cards for unique://content links and *WithSource fences. */
  .file-card {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    border: 1px solid var(--uq-border);
    border-radius: 10px;
    padding: 9px 14px;
    margin: 6px 8px 6px 0;
    background: var(--uq-bg);
    cursor: pointer;
    max-width: 100%;
    box-sizing: border-box;
  }
  .file-card:hover { background: var(--uq-chip-bg); }
  .file-card .ficon {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    background: #fee2e2;
    color: #b91c1c;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 700;
    flex: 0 0 auto;
    text-transform: uppercase;
  }
  .file-card .fname {
    font-size: 13.5px;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .file-card .fhint {
    font-size: 11.5px;
    color: var(--uq-muted);
  }

  /* Prompt-suggestion buttons ([label](https://prompt=…)). */
  .prompt-chip {
    display: inline-block;
    border: 1px solid var(--uq-chip-border);
    background: var(--uq-chip-bg);
    border-radius: 999px;
    padding: 5px 13px;
    margin: 3px 6px 3px 0;
    font-size: 13px;
    color: var(--uq-text);
  }

  /* Steps timeline (message logs), like Unique's expandable step sections. */
  .steps {
    margin: 4px 0 14px;
  }
  .step-group {
    border: 0;
    background: transparent;
    margin: 0 0 2px;
    padding: 0;
  }
  .step-group > summary {
    cursor: pointer;
    list-style: none;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    font-size: 13px;
    color: var(--uq-muted);
    user-select: none;
  }
  .step-group > summary::-webkit-details-marker { display: none; }
  .step-group > summary::before {
    content: "";
    width: 6px;
    height: 6px;
    border-right: 1.5px solid var(--uq-muted);
    border-bottom: 1.5px solid var(--uq-muted);
    transform: rotate(-45deg);
    transition: transform 0.15s ease;
    flex: 0 0 auto;
    margin-left: 2px;
  }
  .step-group[open] > summary::before { transform: rotate(45deg); }
  .step-body {
    position: relative;
    margin: 4px 0 10px 4px;
    padding-left: 20px;
  }
  .step-body::before {
    content: "";
    position: absolute;
    left: 3px;
    top: 8px;
    bottom: 4px;
    width: 3px;
    border-radius: 2px;
    background: #99e5dd;
  }
  .step-event { position: relative; margin-bottom: 14px; }
  .step-event:last-child { margin-bottom: 4px; }
  .step-event::before {
    content: "";
    position: absolute;
    left: -21.5px;
    top: 4px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--uq-bg);
    border: 2px solid #5eead4;
    box-sizing: border-box;
  }
  .step-event .ev-title {
    font-size: 13px;
    font-weight: 650;
    color: #3f3f46;
    margin-bottom: 2px;
  }
  .step-event .ev-sub {
    font-size: 13px;
    font-weight: 650;
    color: #52525b;
    margin: 4px 0 2px;
  }
  .step-event .ev-text {
    font-size: 13px;
    line-height: 1.55;
    color: #52525b;
  }
  .step-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    border: 1px solid var(--uq-chip-border);
    background: var(--uq-bg);
    border-radius: 999px;
    padding: 3px 10px;
    font-size: 12px;
    color: #52525b;
    margin: 3px 0;
  }
  .step-chip::before { content: "⧉"; font-size: 11px; color: #a1a1aa; }

  .msg-time {
    font-size: 11px;
    color: #a1a1aa;
    margin-top: 5px;
  }
  .msg.user .msg-time { text-align: right; }

  .typing {
    display: inline-flex;
    gap: 4px;
    align-items: center;
    height: 18px;
  }
  .typing span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #a1a1aa;
    animation: bounce 1.1s ease-in-out infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  .cursor {
    display: inline-block;
    width: 7px;
    height: 1em;
    background: #0d9488;
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
  }

  .hidden { display: none !important; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes blink { 50% { opacity: 0; } }
  @keyframes pulse {
    0%, 100% { opacity: 0.45; transform: scale(0.9); }
    50% { opacity: 1; transform: scale(1.05); }
  }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.45; }
    40% { transform: translateY(-3px); opacity: 1; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <span class="title">Unique Space Chat</span>
    <span class="spacer"></span>
    <span class="status-pill">
      <span class="status-dot" id="status-dot"></span>
      <span id="status">Connecting…</span>
    </span>
    <button id="open-link" class="hidden" type="button">Open in Unique</button>
  </div>
  <div id="frame-host">
    <div id="placeholder">
      <div class="spinner"></div>
      <div id="placeholder-text">Waiting for the space chat to start…</div>
    </div>
    <div id="chat-panel" class="hidden">
      <div id="messages" aria-live="polite"></div>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  // ---------------------------------------------------------------------
  // Minimal MCP Apps (SEP-1865) JSON-RPC transport over postMessage.
  // ---------------------------------------------------------------------
  var nextId = 1;
  var pending = {};

  function sendRequest(method, params) {
    var id = nextId++;
    return new Promise(function (resolve, reject) {
      pending[id] = { resolve: resolve, reject: reject };
      window.parent.postMessage({ jsonrpc: "2.0", id: id, method: method, params: params }, "*");
    });
  }

  function sendNotification(method, params) {
    window.parent.postMessage({ jsonrpc: "2.0", method: method, params: params }, "*");
  }

  function respond(id, result) {
    window.parent.postMessage({ jsonrpc: "2.0", id: id, result: result }, "*");
  }

  var notificationHandlers = {};
  var requestHandlers = {};

  window.addEventListener("message", function (event) {
    var data = event.data;
    if (!data || data.jsonrpc !== "2.0") return;
    if (data.id !== undefined && data.method === undefined) {
      var entry = pending[data.id];
      if (!entry) return;
      delete pending[data.id];
      if (data.error) {
        entry.reject(new Error(data.error.message || "Host error"));
      } else {
        entry.resolve(data.result);
      }
      return;
    }
    if (data.id !== undefined && data.method !== undefined) {
      var reqHandler = requestHandlers[data.method];
      if (reqHandler) {
        Promise.resolve(reqHandler(data.params)).then(function (result) {
          respond(data.id, result || {});
        });
      } else {
        respond(data.id, {});
      }
      return;
    }
    if (data.method !== undefined) {
      var handler = notificationHandlers[data.method];
      if (handler) handler(data.params);
    }
  });

  // ---------------------------------------------------------------------
  // DOM refs / state
  // ---------------------------------------------------------------------
  var statusEl = document.getElementById("status");
  var statusDotEl = document.getElementById("status-dot");
  var placeholderEl = document.getElementById("placeholder");
  var placeholderTextEl = document.getElementById("placeholder-text");
  var frameHostEl = document.getElementById("frame-host");
  var chatPanelEl = document.getElementById("chat-panel");
  var messagesEl = document.getElementById("messages");
  var openLinkBtn = document.getElementById("open-link");

  var embedUrl = null;
  var openUrl = null;
  var chatId = null;
  var mounted = false;
  var fallbackActive = false;
  var iframeEl = null;
  var iframeLoaded = false;
  var pollTimer = null;
  var stickToBottom = true;
  var lastRenderKey = "";

  var DEFAULT_WIDTH = 760;
  var DEFAULT_HEIGHT = 600;
  var POLL_MS = 1500;

  function setStatus(text, mode) {
    statusEl.textContent = text;
    statusDotEl.className = "status-dot" + (mode ? " " + mode : "");
  }

  function applyTheme(theme) {
    if (theme === "dark" || theme === "light") {
      document.documentElement.style.colorScheme = theme;
    }
  }

  function applyHostStyleVariables(styles) {
    if (!styles || !styles.variables) return;
    var root = document.documentElement;
    Object.keys(styles.variables).forEach(function (key) {
      var value = styles.variables[key];
      if (value !== undefined && value !== null) root.style.setProperty(key, value);
    });
  }

  function applyContainerDimensions(dims) {
    var width = DEFAULT_WIDTH;
    var height = DEFAULT_HEIGHT;
    if (dims && dims.maxWidth) width = Math.min(width, dims.maxWidth);
    if (dims && dims.maxHeight) height = Math.min(height, dims.maxHeight);
    if (dims && dims.height) {
      document.documentElement.style.height = "100vh";
    } else {
      document.documentElement.style.height = height + "px";
      document.body.style.height = height + "px";
    }
    sendNotification("ui/notifications/size-changed", {
      width: width,
      height: height,
    });
  }

  function openExternal(url) {
    if (!url) return;
    sendRequest("ui/open-link", { url: url }).catch(function () {
      try { window.open(url, "_blank", "noopener,noreferrer"); } catch (e) {}
    });
  }

  // ---------------------------------------------------------------------
  // Unique message rendering
  //
  // Assistant text is markdown plus Unique-specific markup:
  //  - <sup>N</sup> citations bound to references[].sequenceNumber
  //  - <details>/<summary> collapsible thinking / code sections
  //  - unique://content/{id} links & images (generated files)
  //  - ````fileWithSource/imgWithSource/htmlWithSource(...)```` fences
  //  - [label](https://prompt=…) suggestion buttons
  // ---------------------------------------------------------------------

  // Fence variants seen in the wild: single-line and multi-line bodies,
  // with or without the closing paren directly before the backticks.
  var FENCE_RE = /````\s*(fileWithSource|imgWithSource|htmlWithSource)\s*\(([\s\S]*?)\)?\s*````/g;
  var FENCE_BODY_RE = /^\s*(?:(fileWithSource|imgWithSource|htmlWithSource)\s*\()?\s*((?:id|contentId)\s*=[\s\S]*)$/;

  function parseFenceAttrs(raw) {
    // Attributes look like: id='1', contentId='cont_x', title="Chart", type="excel"
    var attrs = {};
    var re = /(\w+)\s*=\s*(?:'((?:[^'\\]|\\.)*)'|"((?:[^"\\]|\\.)*)")/g;
    var m;
    while ((m = re.exec(raw)) !== null) {
      attrs[m[1]] = (m[2] !== undefined ? m[2] : m[3]) || "";
    }
    return attrs;
  }

  function fileTypeLabel(t) {
    var map = {
      excel: "XLS", csv: "CSV", word: "DOC", powerpoint: "PPT",
      pdf: "PDF", html: "HTML", image: "IMG", document: "DOC",
    };
    return map[(t || "").toLowerCase()] || "FILE";
  }

  // Replace *WithSource fences with placeholder tokens before markdown
  // parsing; collect the card data to re-insert afterwards.
  function extractFences(text, store) {
    return text.replace(FENCE_RE, function (_all, kind, rawAttrs) {
      var attrs = parseFenceAttrs(rawAttrs);
      var token = "UQFENCE" + store.length + "UQ";
      store.push({ kind: kind, attrs: attrs });
      return "\n\n" + token + "\n\n";
    });
  }

  // Deep link that opens the chat with the file preview in the sidebar
  // (same ?file= parameter the knowledge-upload deep links use).
  function chatFileUrl(contentId) {
    if (!openUrl) return null;
    if (!contentId) return openUrl;
    var sep = openUrl.indexOf("?") === -1 ? "?" : "&";
    return openUrl + sep + "file=" + encodeURIComponent(contentId);
  }

  function buildFileCard(title, typeLabel, contentId) {
    var card = document.createElement("span");
    card.className = "file-card";
    card.setAttribute("role", "button");
    var icon = document.createElement("span");
    icon.className = "ficon";
    icon.textContent = typeLabel;
    var body = document.createElement("span");
    var name = document.createElement("span");
    name.className = "fname";
    name.textContent = title || "Generated file";
    body.appendChild(name);
    var hintEl = document.createElement("span");
    hintEl.className = "fhint";
    hintEl.textContent = " Open in chat";
    body.appendChild(document.createElement("br"));
    body.appendChild(hintEl);
    card.appendChild(icon);
    card.appendChild(body);
    card.addEventListener("click", function () {
      var url = chatFileUrl(contentId);
      if (url) openExternal(url);
    });
    return card;
  }

  function fenceCard(kind, attrs) {
    var typeLabel = kind === "imgWithSource" ? "IMG"
      : kind === "htmlWithSource" ? "HTML"
      : fileTypeLabel(attrs.type);
    return buildFileCard(attrs.title || "Generated file", typeLabel, attrs.contentId);
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function renderMarkdown(text, refs) {
    var fences = [];
    var raw = extractFences(text || "", fences);
    var html;
    try {
      if (typeof marked !== "undefined" && marked.parse) {
        html = marked.parse(raw, { gfm: true, breaks: true });
      } else {
        html = escapeHtml(raw).replace(/\n/g, "<br>");
      }
      if (typeof DOMPurify !== "undefined") {
        html = DOMPurify.sanitize(html, {
          USE_PROFILES: { html: true },
          ADD_TAGS: ["details", "summary", "sup", "sub"],
          ADD_ATTR: ["open", "target", "rel"],
          // Default regexp plus the unique: scheme so unique://content/…
          // file links survive sanitization and become file cards.
          ALLOWED_URI_REGEXP: /^(?:(?:https?|mailto|tel|callto|sms|cid|xmpp|unique):|[^a-z]|[a-z+.-]+(?:[^a-z+.\-:]|$))/i,
        });
      }
    } catch (err) {
      html = escapeHtml(raw).replace(/\n/g, "<br>");
    }

    var container = document.createElement("div");
    container.className = "md";
    container.innerHTML = html;

    decorateCitations(container, refs);
    decorateLinks(container);
    reinsertFences(container, fences);
    convertLeftoverFenceBlocks(container);
    enhanceCodeBlocks(container);
    return container;
  }

  function refBySeq(refs, n) {
    if (!refs) return null;
    for (var i = 0; i < refs.length; i++) {
      if (String(refs[i].sequenceNumber) === String(n)) return refs[i];
    }
    return null;
  }

  function decorateCitations(root, refs) {
    var sups = root.querySelectorAll("sup");
    sups.forEach(function (sup) {
      var n = (sup.textContent || "").trim();
      if (!/^\d+$/.test(n)) return;
      sup.classList.add("cite");
      var ref = refBySeq(refs, n);
      if (ref) {
        sup.title = ref.name || "";
        if (ref.url) {
          sup.addEventListener("click", function () { openExternal(ref.url); });
        }
      }
    });
  }

  function decorateLinks(root) {
    var links = root.querySelectorAll("a[href]");
    links.forEach(function (a) {
      var href = a.getAttribute("href") || "";
      if (href.indexOf("unique://content/") === 0) {
        // Generated file link — render as a file card that deep-links back
        // to the chat with the file opened in the sidebar.
        var contentId = href.slice("unique://content/".length).split(/[?#]/)[0];
        var name = a.textContent || "Generated file";
        var ext = (name.split(".").pop() || "").toLowerCase();
        var typeMap = { pptx: "PPT", ppt: "PPT", xlsx: "XLS", xls: "XLS",
          csv: "CSV", docx: "DOC", doc: "DOC", pdf: "PDF", png: "IMG",
          jpg: "IMG", jpeg: "IMG", html: "HTML" };
        var card = buildFileCard(name, typeMap[ext] || "FILE", contentId);
        a.replaceWith(card);
        return;
      }
      if (href.indexOf("https://prompt=") === 0 || href.indexOf("prompt=") === 0) {
        // Prompt suggestion button — not actionable here; show as chip.
        var chip = document.createElement("span");
        chip.className = "prompt-chip";
        chip.textContent = a.textContent || "";
        a.replaceWith(chip);
        return;
      }
      a.target = "_blank";
      a.rel = "noopener noreferrer";
      a.addEventListener("click", function (ev) {
        ev.preventDefault();
        openExternal(href);
      });
    });

    var imgs = root.querySelectorAll("img[src]");
    imgs.forEach(function (img) {
      var src = img.getAttribute("src") || "";
      if (src.indexOf("unique://content/") === 0) {
        var imgContentId = src.slice("unique://content/".length).split(/[?#]/)[0];
        var card = buildFileCard(img.getAttribute("alt") || "Image", "IMG", imgContentId);
        img.replaceWith(card);
      }
    });
  }

  // Safety net: any code block whose content still looks like a *WithSource
  // fence body (marked can turn odd fence variants into code blocks) becomes
  // a file card instead of showing the raw generation code.
  function convertLeftoverFenceBlocks(root) {
    var pres = root.querySelectorAll("pre");
    pres.forEach(function (pre) {
      var text = (pre.textContent || "").trim();
      var m = FENCE_BODY_RE.exec(text);
      if (!m || text.indexOf("contentId") === -1) return;
      var attrs = parseFenceAttrs(m[2] || text);
      if (!attrs.contentId) return;
      var kind = m[1] || (text.indexOf("imgWithSource") !== -1 ? "imgWithSource" : "fileWithSource");
      pre.replaceWith(fenceCard(kind, attrs));
    });
    // Inline code spans can also carry a collapsed fence.
    var codes = root.querySelectorAll("code");
    codes.forEach(function (code) {
      if (code.closest("pre")) return;
      var text = (code.textContent || "").trim();
      if (text.indexOf("contentId") === -1) return;
      var m = FENCE_BODY_RE.exec(text);
      if (!m) return;
      var attrs = parseFenceAttrs(m[2] || text);
      if (!attrs.contentId) return;
      var kind = m[1] || "fileWithSource";
      code.replaceWith(fenceCard(kind, attrs));
    });
  }

  function reinsertFences(root, fences) {
    if (!fences.length) return;
    var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
    var textNodes = [];
    while (walker.nextNode()) textNodes.push(walker.currentNode);
    textNodes.forEach(function (node) {
      var m = /UQFENCE(\d+)UQ/.exec(node.nodeValue || "");
      if (!m) return;
      var fence = fences[parseInt(m[1], 10)];
      if (!fence) return;
      node.parentNode.replaceChild(fenceCard(fence.kind, fence.attrs || {}), node);
    });
  }

  function enhanceCodeBlocks(root) {
    var blocks = root.querySelectorAll("pre");
    blocks.forEach(function (pre) {
      if (pre.querySelector(".copy-btn")) return;
      var btn = document.createElement("button");
      btn.type = "button";
      btn.className = "copy-btn";
      btn.textContent = "Copy";
      btn.addEventListener("click", function () {
        var code = pre.querySelector("code");
        var text = code ? code.textContent : pre.textContent;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text || "").then(function () {
            btn.textContent = "Copied";
            setTimeout(function () { btn.textContent = "Copy"; }, 1200);
          });
        }
      });
      pre.appendChild(btn);
    });
  }

  // ---------------------------------------------------------------------
  // Steps timeline (message logs) — Unique's expandable step sections.
  // ---------------------------------------------------------------------
  var EVENT_TYPE_LABELS = {
    WebSearch: "Web Search",
    InternalSearch: "Internal Search",
    Thinking: "Thinking",
    ToolCall: "Tool Call",
    Elicitation: "Question",
    Todo: "To-do",
  };

  function mdInline(text) {
    var span = document.createElement("span");
    var html;
    try {
      html = typeof marked !== "undefined" && marked.parseInline
        ? marked.parseInline(text || "")
        : escapeHtml(text || "");
      if (typeof DOMPurify !== "undefined") {
        html = DOMPurify.sanitize(html, { USE_PROFILES: { html: true } });
      }
    } catch (e) {
      html = escapeHtml(text || "");
    }
    span.innerHTML = html;
    return span;
  }

  function stripMd(text) {
    return (text || "").replace(/\*\*/g, "").replace(/^_+|_+$/g, "").trim();
  }

  function logHeader(log) {
    var firstLine = (log.text || "").split("\n")[0];
    return stripMd(firstLine) || "Step";
  }

  function renderStepEvent(ev) {
    var wrap = document.createElement("div");
    wrap.className = "step-event";

    var title = document.createElement("div");
    title.className = "ev-title";
    title.textContent = EVENT_TYPE_LABELS[ev.type] || ev.type || "Step";
    wrap.appendChild(title);

    var text = (ev.text || "").trim();
    if (!text) return wrap;

    if (ev.type === "Todo") {
      var todo = document.createElement("div");
      todo.className = "ev-text";
      todo.textContent = (ev.status === "done" ? "✓ " : "○ ") + stripMd(text);
      wrap.appendChild(todo);
      return wrap;
    }

    // Short single-token payloads (skill / tool names) render as chips.
    if ((ev.type === "ToolCall" || ev.type === "WebSearch") && text.length <= 48 && text.indexOf("\n") === -1) {
      var chip = document.createElement("span");
      chip.className = "step-chip";
      chip.appendChild(document.createTextNode(stripMd(text)));
      wrap.appendChild(chip);
      return wrap;
    }

    var lines = text.split("\n");
    var first = lines[0] || "";
    var rest = lines.slice(1).join("\n").trim();
    // A bold first line acts as a sub-heading (e.g. thinking topic).
    if (/^\*\*.+\*\*$/.test(first.trim()) && rest) {
      var sub = document.createElement("div");
      sub.className = "ev-sub";
      sub.textContent = stripMd(first);
      wrap.appendChild(sub);
      var body = document.createElement("div");
      body.className = "ev-text";
      body.appendChild(mdInline(rest.replace(/\n/g, " ")));
      wrap.appendChild(body);
    } else {
      var textEl = document.createElement("div");
      textEl.className = "ev-text";
      textEl.appendChild(mdInline(text.replace(/\n/g, " ")));
      wrap.appendChild(textEl);
    }
    return wrap;
  }

  function renderSteps(logs) {
    var container = document.createElement("div");
    container.className = "steps";
    logs.forEach(function (log) {
      var group = document.createElement("details");
      group.className = "step-group";
      group.open = true;
      var summary = document.createElement("summary");
      summary.textContent = logHeader(log);
      group.appendChild(summary);

      var body = document.createElement("div");
      body.className = "step-body";
      var events = log.events || [];
      if (events.length) {
        events.forEach(function (ev) {
          body.appendChild(renderStepEvent(ev));
        });
      } else {
        // No structured events — show the log text lines under the header.
        var restLines = (log.text || "").split("\n").slice(1).join("\n").trim();
        var ev = renderStepEvent({
          type: log.status === "FAILED" ? "Failed" : "Status Update",
          text: restLines || logHeader(log),
        });
        body.appendChild(ev);
      }
      group.appendChild(body);
      container.appendChild(group);
    });
    return container;
  }

  function formatTime(iso) {
    if (!iso) return "";
    try {
      var d = new Date(iso);
      if (isNaN(d.getTime())) return "";
      return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    } catch (e) {
      return "";
    }
  }

  // ---------------------------------------------------------------------
  // Message list rendering (oldest first, newest at the bottom)
  // ---------------------------------------------------------------------
  function renderMessages(messages, streaming) {
    var key = JSON.stringify(messages) + "|" + (streaming ? "1" : "0");
    if (key === lastRenderKey) return;
    lastRenderKey = key;

    var keepBottom = stickToBottom;
    messagesEl.innerHTML = "";

    var visible = (messages || []).filter(function (m, idx, arr) {
      if (!m || m.role === "SYSTEM") return false;
      // Hide empty assistant placeholder messages (no text and no step
      // logs) except a streaming tail.
      var isLast = idx === arr.length - 1;
      var hasContent = (m.text || "").trim() || (m.logs && m.logs.length);
      if (m.role === "ASSISTANT" && !hasContent && !(isLast && !m.done)) {
        return false;
      }
      return true;
    });

    if (!visible.length) {
      var emptyMsg = document.createElement("div");
      emptyMsg.className = "msg assistant";
      var emptyInner = document.createElement("div");
      emptyInner.className = "msg-inner";
      emptyInner.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
      emptyMsg.appendChild(emptyInner);
      messagesEl.appendChild(emptyMsg);
    } else {
      visible.forEach(function (m, idx) {
        var isUser = m.role === "USER";
        var isLast = idx === visible.length - 1;
        var msg = document.createElement("div");
        msg.className = "msg " + (isUser ? "user" : "assistant");
        var inner = document.createElement("div");
        inner.className = "msg-inner";

        if (isUser) {
          var bubble = document.createElement("div");
          bubble.className = "bubble";
          bubble.textContent = m.text || "";
          inner.appendChild(bubble);
        } else {
          if (m.logs && m.logs.length) {
            inner.appendChild(renderSteps(m.logs));
          }
          var text = m.text || "";
          if (!text.trim() && !m.done) {
            inner.innerHTML += '<div class="typing"><span></span><span></span><span></span></div>';
          } else {
            var md = renderMarkdown(text, m.references || []);
            if (!m.done && isLast && streaming) {
              var cursor = document.createElement("span");
              cursor.className = "cursor";
              md.appendChild(cursor);
            }
            inner.appendChild(md);

            // References row: only show refs not already usable as inline
            // citations (i.e. always list them, Unique shows a sources row).
            if (m.references && m.references.length) {
              var refs = document.createElement("div");
              refs.className = "refs";
              m.references.forEach(function (ref) {
                var chip = document.createElement("span");
                chip.className = "ref-chip";
                var num = document.createElement("span");
                num.className = "n";
                num.textContent = ref.sequenceNumber != null ? String(ref.sequenceNumber) : "•";
                chip.appendChild(num);
                chip.appendChild(document.createTextNode(" " + (ref.name || "source")));
                if (ref.url) {
                  chip.addEventListener("click", function () { openExternal(ref.url); });
                }
                refs.appendChild(chip);
              });
              inner.appendChild(refs);
            }
          }
        }

        msg.appendChild(inner);
        messagesEl.appendChild(msg);
      });
    }

    if (keepBottom) {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
  }

  messagesEl.addEventListener("scroll", function () {
    var distance = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight;
    stickToBottom = distance < 48;
  });

  // ---------------------------------------------------------------------
  // Fallback polling (when the host CSP blocks the nested Unique iframe)
  // ---------------------------------------------------------------------
  function startFallbackTranscript(reason) {
    if (fallbackActive) return;
    if (!chatId) {
      setTimeout(function () {
        if (!fallbackActive && chatId) startFallbackTranscript(reason);
      }, 500);
      return;
    }
    fallbackActive = true;
    if (iframeEl) { iframeEl.remove(); iframeEl = null; }
    placeholderEl.classList.add("hidden");
    chatPanelEl.classList.remove("hidden");
    openLinkBtn.classList.remove("hidden");
    setStatus("Streaming", "streaming");
    if (reason) console.warn("space-chat: iframe fallback —", reason);
    pollOnce();
  }

  function stopPolling() {
    if (pollTimer) {
      clearTimeout(pollTimer);
      pollTimer = null;
    }
  }

  function pollOnce() {
    if (!chatId) return;
    sendRequest("tools/call", {
      name: "peek_space_answer",
      arguments: { chat_id: chatId },
    })
      .then(function (result) {
        if (result && result.isError) {
          var errText = "Could not fetch the answer.";
          if (result.content && result.content[0] && result.content[0].text) {
            errText = result.content[0].text;
          }
          setStatus("Error", "error");
          renderMessages(
            [{ id: "err", role: "ASSISTANT", text: errText, done: true, references: [] }],
            false
          );
          return;
        }
        var s = (result && result.structuredContent) || {};
        var messages = s.messages || [];
        var done = !!s.done;
        renderMessages(messages, !done);
        if (done) {
          setStatus("Done", "idle");
        } else {
          setStatus("Streaming", "streaming");
          pollTimer = setTimeout(pollOnce, POLL_MS);
        }
      })
      .catch(function (err) {
        setStatus("Error", "error");
        renderMessages(
          [{ id: "err", role: "ASSISTANT", text: "Could not fetch the answer: " + String(err), done: true, references: [] }],
          false
        );
      });
  }

  // Detect the host sandbox blocking the nested iframe (CSP frame-src).
  window.addEventListener("securitypolicyviolation", function (e) {
    if (e.violatedDirective && e.violatedDirective.indexOf("frame-src") !== -1) {
      startFallbackTranscript("CSP blocked nested iframe (" + e.blockedURI + ")");
    }
  });

  function mountEmbed() {
    if (mounted || !embedUrl) return;
    mounted = true;
    iframeEl = document.createElement("iframe");
    iframeEl.title = "Unique Chat";
    iframeEl.src = embedUrl;
    iframeEl.allow = "clipboard-write; microphone";
    iframeEl.addEventListener("load", function () { iframeLoaded = true; });
    frameHostEl.appendChild(iframeEl);
    placeholderEl.classList.add("hidden");
    setStatus("Connected", "idle");
    openLinkBtn.classList.remove("hidden");
    // Safety net: if the iframe never loads (blocked without a CSP event
    // reaching us), switch to the native chat panel.
    setTimeout(function () {
      if (!iframeLoaded && !fallbackActive) {
        startFallbackTranscript("iframe did not load within 4s");
      }
    }, 4000);
  }

  function handleToolResult(result) {
    if (!result) return;
    if (result.isError) {
      var spinner = placeholderEl.querySelector(".spinner");
      if (spinner) spinner.classList.add("hidden");
      var text = "The space call failed.";
      if (result.content && result.content.length && result.content[0].text) {
        text = result.content[0].text;
      }
      placeholderTextEl.textContent = text;
      setStatus("Error", "error");
      return;
    }
    var structured = result.structuredContent || {};
    if (structured.chatId) chatId = structured.chatId;
    if (structured.embedUrl) {
      embedUrl = structured.embedUrl;
      openUrl = structured.openUrl || structured.embedUrl;
      mountEmbed();
    } else if (chatId && !fallbackActive && !mounted) {
      startFallbackTranscript("no embed URL in tool result");
    }
  }

  notificationHandlers["ui/notifications/tool-result"] = handleToolResult;
  notificationHandlers["ui/notifications/host-context-changed"] = function (ctx) {
    if (!ctx) return;
    if (ctx.theme) applyTheme(ctx.theme);
    if (ctx.styles) applyHostStyleVariables(ctx.styles);
    if (ctx.containerDimensions) applyContainerDimensions(ctx.containerDimensions);
  };
  requestHandlers["ui/resource-teardown"] = function () {
    stopPolling();
    return {};
  };

  openLinkBtn.addEventListener("click", function () {
    openExternal(openUrl);
  });

  // ---------------------------------------------------------------------
  // Handshake
  // ---------------------------------------------------------------------
  sendRequest("ui/initialize", {
    protocolVersion: "2026-01-26",
    appCapabilities: { availableDisplayModes: ["inline", "fullscreen"] },
    appInfo: { name: "unique-space-chat", version: "1.1.0" },
    clientInfo: { name: "unique-space-chat", version: "1.1.0" },
  })
    .then(function (result) {
      var ctx = (result && result.hostContext) || {};
      applyTheme(ctx.theme);
      applyHostStyleVariables(ctx.styles);
      applyContainerDimensions(ctx.containerDimensions);
      sendNotification("ui/notifications/initialized", {});
      setStatus("Starting chat…");
      placeholderTextEl.textContent =
        "Waiting for the space chat to start… If the chat asks you to sign in, " +
        "use “Open in Unique” to sign in first, then retry.";
    })
    .catch(function (err) {
      setStatus("Host handshake failed", "error");
      placeholderTextEl.textContent = String(err);
    });
})();
</script>
</body>
</html>
