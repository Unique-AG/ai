<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hello World — MCP Apps smoke test</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #f8fafc;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --accent-2: #a78bfa;
  }
  html, body {
    margin: 0;
    padding: 0;
    width: 560px;
    height: 360px;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, sans-serif;
  }
  #app {
    box-sizing: border-box;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 24px;
    background:
      radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.18), transparent 45%),
      radial-gradient(circle at 80% 80%, rgba(167, 139, 250, 0.18), transparent 40%),
      var(--bg);
  }
  .badge {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }
  h1 {
    margin: 0;
    font-size: 42px;
    font-weight: 700;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: bob 2.2s ease-in-out infinite;
  }
  .orb {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.55);
    animation: pulse 1.6s ease-out infinite;
  }
  p {
    margin: 0;
    color: var(--muted);
    font-size: 14px;
    text-align: center;
    max-width: 420px;
    line-height: 1.45;
  }
  #status {
    font-size: 12px;
    color: var(--accent);
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.55); }
    70% { box-shadow: 0 0 0 22px rgba(56, 189, 248, 0); }
    100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); }
  }
</style>
</head>
<body>
<div id="app">
  <div class="badge">MCP Apps smoke test</div>
  <div class="orb" aria-hidden="true"></div>
  <h1>Hello World</h1>
  <p>
    If you can see this animated card, the host is rendering MCP Apps HTML
    (no Unique iframe). Preferred size: <strong>560×360</strong> px.
  </p>
  <div id="status">Connecting to host…</div>
</div>
<script>
(function () {
  "use strict";

  var PREFERRED_WIDTH = 560;
  var PREFERRED_HEIGHT = 360;

  var nextId = 1;
  var pending = {};
  var statusEl = document.getElementById("status");

  function sendRequest(method, params) {
    var id = nextId++;
    return new Promise(function (resolve, reject) {
      pending[id] = { resolve: resolve, reject: reject };
      window.parent.postMessage(
        { jsonrpc: "2.0", id: id, method: method, params: params },
        "*"
      );
    });
  }

  function sendNotification(method, params) {
    window.parent.postMessage({ jsonrpc: "2.0", method: method, params: params }, "*");
  }

  function respond(id, result) {
    window.parent.postMessage({ jsonrpc: "2.0", id: id, result: result || {} }, "*");
  }

  window.addEventListener("message", function (event) {
    var data = event.data;
    if (!data || data.jsonrpc !== "2.0") return;
    if (data.id !== undefined && data.method === undefined) {
      var entry = pending[data.id];
      if (!entry) return;
      delete pending[data.id];
      if (data.error) entry.reject(new Error(data.error.message || "Host error"));
      else entry.resolve(data.result);
      return;
    }
    if (data.id !== undefined && data.method !== undefined) {
      // Acknowledge host requests (e.g. ui/resource-teardown).
      respond(data.id, {});
    }
  });

  function requestPreferredSize() {
    sendNotification("ui/notifications/size-changed", {
      width: PREFERRED_WIDTH,
      height: PREFERRED_HEIGHT,
    });
  }

  sendRequest("ui/initialize", {
    protocolVersion: "2026-01-26",
    appCapabilities: { availableDisplayModes: ["inline", "fullscreen"] },
    appInfo: { name: "unique-space-chat-hello-world", version: "1.0.0" },
    clientInfo: { name: "unique-space-chat-hello-world", version: "1.0.0" },
  })
    .then(function () {
      sendNotification("ui/notifications/initialized", {});
      requestPreferredSize();
      // Hosts sometimes apply containerDimensions after init; re-assert size.
      setTimeout(requestPreferredSize, 250);
      statusEl.textContent = "Host handshake OK · requested 560×360";
    })
    .catch(function (err) {
      statusEl.textContent = "Host handshake failed: " + String(err);
    });
})();
</script>
</body>
</html>
