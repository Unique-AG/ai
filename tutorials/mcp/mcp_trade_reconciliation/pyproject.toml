[project]
name = "mcp-trade-reconciliation"
version = "0.1.0"
description = "MCP server that reconciles counterparty (email) cash flows against customer (book) cash flows."
readme = "README.md"
authors = [{ name = "Andreas Hauri", email = "andreas@unique.ch" }]
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.120.2",
    "fastmcp>=3.4.4",
    "psycopg2-binary>=2.9.11",
    "py-key-value-aio[postgresql]>=0.4.0",
    "pydantic>=2.12.3",
    "python-dotenv>=1.0.0",
]

[tool.uv]
# Relaxed from "2 weeks" so fastmcp 3.4.4 (fixes client_secret_basic parsing
# at the /token endpoint, which the platform's MCP SDK uses) can resolve.
exclude-newer = "1 day"
constraint-dependencies = [
    "authlib>=1.6.11",
    "cryptography>=46.0.7",
    "fastmcp>=3.2.0",
    "pillow>=12.2.0",
    "pyjwt>=2.12.0",
    "pygments>=2.20.0",
    "python-dotenv>=1.2.2",
    "python-multipart>=0.0.27",
    "requests>=2.33.0",
    "urllib3>=2.7.0",
]

[build-system]
requires = ["uv_build>=0.8.14,<0.9.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "ruff>=0.14.8",
    "deptry>=0.24.0",
]

[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["E"]
per-file-ignores = { "src/mcp_trade_reconciliation/db_tool_reconciliation/prompts.py" = ["E501"], "src/mcp_trade_reconciliation/db_tool_reconciliation/service.py" = ["E501"], "src/mcp_trade_reconciliation/mcp_trade_reconciliation.py" = ["E501"] }

[tool.deptry]
known_first_party = ["mcp_trade_reconciliation", "db_tool_reconciliation"]
ignore = ["DEP003"]
