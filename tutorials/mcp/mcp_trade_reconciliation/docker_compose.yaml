version: "3.9"

services:
  postgres:
    # Pinned by digest for reproducible, supply-chain-safe pulls (postgres:16).
    image: postgres:16@sha256:081f1bc7bd5e143dbb6e487b710bbc27712cdcfaced4c071b8e47349aa1b4171
    container_name: postgres_trade_reconciliation
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reconciliationdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reconciliationdb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
