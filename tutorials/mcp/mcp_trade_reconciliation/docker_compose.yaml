version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: postgres_trade_reconciliation
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reconciliationdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reconciliationdb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
