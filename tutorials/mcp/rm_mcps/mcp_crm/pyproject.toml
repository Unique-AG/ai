[project]
name = "mcp-crm"
version = "0.1.0"
description = "RM Agent CRM MCP — relationship side (CRM, client memory, calendar), served from PostgreSQL."
readme = "README.md"
authors = [{ name = "Florian Barras", email = "florian.barras@unique.ai" }]
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.120.2",
    "fastmcp>=2.13.0.2",
    "psycopg2-binary>=2.9.11",
    "py-key-value-aio[postgresql]>=0.4.0",
    "pydantic>=2.12.3",
    "python-dotenv>=1.0.0",
    "unique-sdk>=2026.24",          # KB download + scope resolution for edit_dashboard_section
    "unique-toolkit>=2026.24",      # KnowledgeBaseService.upload_content_from_bytes (the working KB write path)
    "requests>=2.32",               # file_io PUT/GET of KB blobs
]

[tool.uv]
exclude-newer = "2 weeks"

[dependency-groups]
dev = [
    "ruff>=0.14.8",
    "deptry>=0.24.0",
    "pytest>=8.0",
]

[build-system]
requires = ["uv_build>=0.8.14,<0.9.0"]
build-backend = "uv_build"

[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["E"]

[tool.deptry]
known_first_party = ["mcp_crm", "common", "crm", "meetings", "client_memory"]

[tool.pytest.ini_options]
pythonpath = ["src/mcp_crm"]
testpaths = ["tests"]
markers = [
    "integration: needs a running, seeded Postgres (and live server for the http tests); run with -m integration",
]
