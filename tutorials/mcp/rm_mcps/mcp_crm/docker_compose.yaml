services:
  postgres:
    image: postgres:16
    container_name: postgres_rm_crm
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mcpdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mcpdb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
