[project]
name = "mcp-advisory"
version = "0.1.0"
description = "RM Agent Advisory MCP — investment/portfolio side (house views first; portfolios, transactions, model portfolios, lombard to follow), served from PostgreSQL."
readme = "README.md"
authors = [{ name = "Florian Barras", email = "florian.barras@unique.ai" }]
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.120.2",
    "fastmcp>=2.13.0.2",
    "psycopg2-binary>=2.9.11",
    "py-key-value-aio[postgresql]>=0.4.0",
    "pydantic>=2.12.3",
    "python-dotenv>=1.0.0",
]

[tool.uv]
exclude-newer = "2 weeks"

[dependency-groups]
dev = [
    "ruff>=0.14.8",
    "deptry>=0.24.0",
    "pytest>=8.0",
]

[build-system]
requires = ["uv_build>=0.8.14,<0.9.0"]
build-backend = "uv_build"

[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["E"]

[tool.deptry]
known_first_party = ["mcp_advisory", "common", "house_views", "portfolios", "transactions", "model_portfolios", "lombard"]

[tool.pytest.ini_options]
pythonpath = ["src/mcp_advisory"]
testpaths = ["tests"]
markers = [
    "integration: needs a running, seeded Postgres (and live server for the http tests); run with -m integration",
]
