    <!--
      One template → N client detail pages from list_rows.
      All fields are live via data-unique-field; {placeholders} are filled per row.
    -->
    <div
      class="client-pages"
      data-unique-list="clientPages"
      data-unique-source-server="__MCP_SERVER__"
      data-unique-source-tool="list_rows"
      data-unique-source-args='{"table":"clients","limit":200}'
      data-unique-source-path="rows"
      data-unique-source-poll="__POLL_MS__"
    >
      <template data-unique-item>
        <!--
          Host only interpolates {placeholders} via data-unique-attr-*.
          A plain id attribute would stay literal and every card would
          target the same first page.
        -->
        <main
          class="detail view-client"
          data-unique-attr-id="client-{row_id}"
          data-unique-key="row_id"
        >
          <div
            class="crit-banner"
            data-unique-attr-data-criticality="criticality"
          >
            <span class="cb-l"
              ><strong>Attention</strong> ·
              <span class="cb-issue" data-unique-field="open_issue"></span
            ></span>
            <a
              class="cb-src"
              data-unique-attr-href="#client-{row_id}"
              >View source</a
            >
            <a class="cb-x" href="#top" title="Close">✕</a>
          </div>

          <!-- Action bar first so Analyse is visible when an attention card opens. -->
          <section class="card actionbar">
            <div class="actionbar-copy">
              <h2>Review this issue</h2>
              <p class="small muted">
                Run <strong>Analyse with AI</strong> for an assessment and
                recommendation in the chat; the analysis then concludes by
                escalating this client to Compliance.
              </p>
            </div>
            <div class="actionbar-btns">
              <span class="act"
                ><button
                  class="btn btn-ai"
                  data-unique-action="sendPrompt"
                  data-unique-attr-data-unique-payload='{"prompt":"Analyse **{client_name}** (`{client_ref}`, row {row_id})\n\n**Open issue:** {open_issue}\n**Rule:** {rule_code}\n**Criticality:** {criticality}\n\nPlease cover:\n1. What the open issue means\n2. Likely root causes\n3. Severity\n4. Clear recommendation on whether to escalate to Compliance, and why\n\nThen call `escalate_row` on table `clients` with `row_id` {row_id} — do **not** use `update_row`. `escalate_row` will ask for confirmation (recipient email + note) and notify Compliance.\n\nMCP server: `__MCP_SERVER__`"}'
                >
                  ✨ Analyse with AI</button
                ><span class="toast toast-agent" role="status"
                  >✨ Sent to me — analysing the issue, then escalating to
                  Compliance</span
                ></span
              >
            </div>
          </section>

          <header
            class="detail-head"
            data-unique-attr-data-criticality="criticality"
          >
            <div class="dh-id">
              <span
                class="avatar avatar-lg avatar-from-name"
                data-unique-field="client_name"
              ></span>
              <div>
                <h1 data-unique-field="client_name"></h1>
                <p class="dh-sub">
                  Client ID <code data-unique-field="crd_number"></code> ·
                  <span data-unique-field="client_ref"></span> ·
                  <span data-unique-field="segment"></span>
                </p>
              </div>
            </div>
            <div class="dh-meta">
              <span
                class="badge"
                data-unique-attr-data-status="status"
                data-unique-field="status"
              ></span>
              <span class="badge" data-unique-attr-data-risk="risk_level"
                ><span class="risk-ico"></span>&nbsp;<span
                  data-unique-field="risk_level"
                ></span>
                risk</span
              >
              <span class="dh-value"
                ><span data-unique-field="currency"></span>&nbsp;<span
                  data-unique-field="portfolio_value"
                ></span
              ></span>
            </div>
          </header>

          <details class="card sec" open>
            <summary class="sec-sum">
              <span class="sec-chev">›</span>
              <h2>Executive summary</h2>
              <span class="sec-meta" data-unique-field="rule_code"></span>
            </summary>
            <div class="sec-body">
              <div class="tags">
                <span class="tag" data-unique-field="segment"></span>
                <span class="tag"
                  ><span data-unique-field="risk_profile"></span> profile</span
                >
                <span class="tag" data-unique-field="rule_code"></span>
              </div>
              <p class="summary">
                <span data-unique-field="open_issue"></span>. Recommended
                action:
                <span data-unique-field="recommended_action"></span>
              </p>
            </div>
          </details>

          <details class="card sec" open>
            <summary class="sec-sum">
              <span class="sec-chev">›</span>
              <h2>Client identity</h2>
              <span class="sec-meta">Identity &amp; contact</span>
            </summary>
            <div class="sec-body">
              <div class="fldgrid cols-3">
                <div class="fld">
                  <span class="fld-l">Full name</span
                  ><span class="fld-v" data-unique-field="client_name"></span>
                </div>
                <div class="fld">
                  <span class="fld-l">Client type</span
                  ><span class="fld-v" data-unique-field="type"></span>
                </div>
                <div class="fld">
                  <span class="fld-l">Date of birth</span
                  ><span
                    class="fld-v na-field"
                    data-unique-field="date_of_birth"
                  ></span>
                </div>
                <div class="fld">
                  <span class="fld-l">Occupation</span
                  ><span
                    class="fld-v na-field"
                    data-unique-field="occupation"
                  ></span>
                </div>
                <div class="fld">
                  <span class="fld-l">Marital status</span
                  ><span
                    class="fld-v na-field"
                    data-unique-field="marital_status"
                  ></span>
                </div>
                <div class="fld">
                  <span class="fld-l">Nationality</span
                  ><span class="fld-v" data-unique-field="nationality"></span>
                </div>
                <div class="fld">
                  <span class="fld-l">Country of residence</span
                  ><span class="fld-v" data-unique-field="residence"></span>
                </div>
                <div class="fld">
                  <span class="fld-l">Domicile / tax residence</span
                  ><span class="fld-v" data-unique-field="domicile"></span>
                </div>
                <div class="fld">
                  <span class="fld-l">Incorporation</span
                  ><span
                    class="fld-v na-field"
                    data-unique-field="incorporation"
                  ></span>
                </div>
                <div class="fld">
                  <span class="fld-l">Residential address</span
                  ><span
                    class="fld-v na-field"
                    data-unique-field="residential_address"
                  ></span>
                </div>
                <div class="fld">
                  <span class="fld-l">Email</span
                  ><span class="fld-v na-field" data-unique-field="email"></span>
                </div>
                <div class="fld">
                  <span class="fld-l">Phone</span
                  ><span class="fld-v na-field" data-unique-field="phone"></span>
                </div>
                <div class="fld">
                  <span class="fld-l">Client reference</span
                  ><span class="fld-v"
                    ><code data-unique-field="crd_number"></code
                  ></span>
                </div>
                <div class="fld">
                  <span class="fld-l">Onboarded</span
                  ><span class="fld-v" data-unique-field="onboarded"></span>
                </div>
              </div>
            </div>
          </details>

          <details class="card sec" open>
            <summary class="sec-sum">
              <span class="sec-chev">›</span>
              <h2>Open issue &amp; remediation</h2>
              <span class="sec-meta" data-unique-field="rule_code"></span>
            </summary>
            <div class="sec-body">
              <div class="fldgrid cols-3">
                <div class="fld">
                  <span class="fld-l">Open issue</span
                  ><span
                    class="fld-v na-field"
                    data-unique-field="open_issue"
                  ></span>
                </div>
                <div class="fld">
                  <span class="fld-l">Rule code</span
                  ><span class="fld-v"
                    ><code data-unique-field="rule_code"></code
                  ></span>
                </div>
                <div class="fld">
                  <span class="fld-l">Recommended action</span
                  ><span
                    class="fld-v na-field"
                    data-unique-field="recommended_action"
                  ></span>
                </div>
                <div class="fld">
                  <span class="fld-l">Due</span
                  ><span
                    class="fld-v na-field"
                    data-unique-field="due_date"
                  ></span>
                </div>
              </div>
            </div>
          </details>

          <details class="card sec">
            <summary class="sec-sum">
              <span class="sec-chev">›</span>
              <h2>Screening</h2>
              <span class="sec-meta">AML / KYC</span>
            </summary>
            <div class="sec-body">
              <div class="fldgrid cols-3">
                <div class="fld">
                  <span class="fld-l">PEP status</span
                  ><span class="fld-v" data-unique-field="pep"></span>
                </div>
                <div class="fld">
                  <span class="fld-l">Adverse media</span
                  ><span class="fld-v" data-unique-field="adverse_media"></span>
                </div>
                <div class="fld">
                  <span class="fld-l">Sanctions</span
                  ><span class="fld-v" data-unique-field="sanctions"></span>
                </div>
                <div class="fld">
                  <span class="fld-l">US Person (FATCA)</span
                  ><span
                    class="fld-v"
                    data-unique-field="fatca_us_person"
                  ></span>
                </div>
                <div class="fld">
                  <span class="fld-l">Verification source</span
                  ><span
                    class="fld-v"
                    data-unique-field="verification_source"
                  ></span>
                </div>
              </div>
            </div>
          </details>

          <details class="card sec">
            <summary class="sec-sum">
              <span class="sec-chev">›</span>
              <h2>Review schedule</h2>
              <span class="sec-meta"
                >Next <span data-unique-field="next_review_due"></span
              ></span>
            </summary>
            <div class="sec-body">
              <div class="fldgrid cols-3">
                <div class="fld">
                  <span class="fld-l">Last reviewed</span
                  ><span class="fld-v" data-unique-field="last_reviewed"></span>
                </div>
                <div class="fld">
                  <span class="fld-l">Next review due</span
                  ><span class="fld-v" data-unique-field="next_review_due"></span>
                </div>
                <div class="fld">
                  <span class="fld-l">KYC refresh due</span
                  ><span class="fld-v" data-unique-field="kyc_refresh_due"></span>
                </div>
              </div>
            </div>
          </details>

          <details class="card sec">
            <summary class="sec-sum">
              <span class="sec-chev">›</span>
              <h2>Documents on file</h2>
              <span class="sec-meta">From client record</span>
            </summary>
            <div class="sec-body">
              <div class="docrow">
                <span class="doc" data-unique-field="documents_on_file"></span>
              </div>
            </div>
          </details>

          <div class="detail-bar">
            <a class="btn btn-back" href="#top">← Back to console</a>
          </div>
        </main>
      </template>
      <p data-unique-state="loading" class="small muted" hidden>
        Loading client pages…
      </p>
      <p data-unique-state="error" class="small muted">
        Couldn’t load client pages from the database.
      </p>
    </div>
