# ════ Identity ════════════════════════════════════════════════════════════════
nameOverride: search-proxy
fullnameOverride: search-proxy
selectorComponentLabel: server

# ════ Compute ═════════════════════════════════════════════════════════════════

# ── Deployment ────────────────────────────────────────────────────────────────
env:
  LOG_LEVEL: info
  TIMEOUT: "120"
  WORKERS: "4"

image:
  pullPolicy: IfNotPresent
  registry: ghcr.io
  repository: unique-ag/ai/search-proxy
  tag: "2026.26.0" # x-release-please-version
  useDigest: false # not yet supported for out-of-tree charts

ports:
  application: 8080

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 384Mi

probes:
  enabled: true
  liveness:
    failureThreshold: 6
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5
  readiness:
    failureThreshold: 6
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5
  startup:
    failureThreshold: 30
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10

deployment:
  metadata:
    annotations:
      reloader.stakater.com/auto: "true"
  revisionHistoryLimit: 3

# ── Volumes ───────────────────────────────────────────────────────────────────
volumeMounts:
  - mountPath: /tmp
    name: tmp-volume

volumes:
  - emptyDir:
      sizeLimit: 5Gi
    name: tmp-volume

# ── WorkloadIdentity (GCP, Vertex AI) ─────────────────────────────────────────
workloadIdentity:
  gcp:
    enabled: false
    projectId: ""
    provider: ""
    serviceAccountEmail: ""
    workloadIdentityPool: ""

# ════ Data ════════════════════════════════════════════════════════════════════

# @helm-gen:begin providers
googleSearch:
  enabled: false
  # apiKey: <fromSecret or fromSecretProvider>
  # engineId: <set in cluster overlay when enabled>
  connection:
    apiEndpoint: "https://www.googleapis.com/customsearch/v1"

braveSearch:
  enabled: false
  # apiKey: <fromSecret or fromSecretProvider>
  connection:
    apiEndpoint: "https://api.search.brave.com/res/v1/web/search"

perplexitySearch:
  enabled: false
  # apiKey: <fromSecret or fromSecretProvider>
  connection:
    apiEndpoint: "https://api.perplexity.ai/search"

bingAgent:
  enabled: false
  # endpoint: <set in cluster overlay when enabled>
  # bingResourceConnectionString: <set in cluster overlay when enabled>
  connection:
    bingAgentModel: "gpt-4o-deployment"
    azureIdentityCredentialType: default
    azureIdentityValidateTokenUrl: "https://management.azure.com/.default"
    usePrivateEndpointTransport: false

vertexaiAgent:
  enabled: false
  # serviceAccountCredentials: <fromSecret or fromSecretProvider>
  connection:
    {}

tavily:
  enabled: false
  # apiKey: <fromSecret or fromSecretProvider>
  connection:
    apiEndpoint: "https://api.tavily.com"

jina:
  enabled: false
  # apiKey: <fromSecret or fromSecretProvider>
  connection:
    deployment: global
    apiDomain: jina.ai

firecrawl:
  enabled: false
  # apiKey: <fromSecret or fromSecretProvider>
  connection:
    apiEndpoint: "https://api.firecrawl.dev"
    apiVersion: v2

httpClient:
  enabled: false
  # proxyUsername: <fromSecret or fromSecretProvider>
  # proxyPassword: <fromSecret or fromSecretProvider>
  connection:
    proxyAuthMode: none
    proxyProtocol: http
    poolTimeoutSeconds: 30.0
    maxConnections: 100
    maxKeepaliveConnections: 20

# urlSafety: omitted in v1 (lists use code defaults)
# @helm-gen:end providers

# ════ Exposure ════════════════════════════════════════════════════════════════

# ── Service ───────────────────────────────────────────────────────────────────
service:
  port: 80

# ════ Operations ══════════════════════════════════════════════════════════════

# ── ServiceAccount ────────────────────────────────────────────────────────────
serviceAccount:
  enabled: true

# ── HorizontalPodAutoscaler ───────────────────────────────────────────────────
autoscaling:
  enabled: false

# ── PodDisruptionBudget ───────────────────────────────────────────────────────
pdb:
  maxUnavailable: 30%

# ── NetworkPolicy ─────────────────────────────────────────────────────────────
networkPolicy:
  enabled: false
  flavor: cilium
  enableDefaultDeny:
    ingress: true
    egress: true
