# ════ Identity ════════════════════════════════════════════════════════════════
nameOverride: search-proxy
fullnameOverride: search-proxy
selectorComponentLabel: server

# ════ Compute ═════════════════════════════════════════════════════════════════

# ── Deployment ────────────────────────────────────────────────────────────────
env:
  LOG_LEVEL: info
  TIMEOUT: "120"
  WORKERS: "4"

image:
  pullPolicy: IfNotPresent
  registry: ghcr.io
  repository: unique-ag/ai/search-proxy
  tag: "2026.30.0" # x-release-please-version
  useDigest: false # not yet supported for out-of-tree charts

ports:
  application: 8080

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 384Mi

probes:
  enabled: true
  liveness:
    failureThreshold: 6
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5
  readiness:
    failureThreshold: 6
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5
  startup:
    failureThreshold: 30
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10

deployment:
  metadata:
    annotations:
      reloader.stakater.com/auto: "true"
  revisionHistoryLimit: 3

# ── Volumes ───────────────────────────────────────────────────────────────────
volumeMounts:
  - mountPath: /tmp
    name: tmp-volume

volumes:
  - emptyDir:
      sizeLimit: 5Gi
    name: tmp-volume

# ── WorkloadIdentity (GCP, Vertex AI) ─────────────────────────────────────────
workloadIdentity:
  gcp:
    enabled: false
    projectId: ""
    provider: ""
    serviceAccountEmail: ""
    workloadIdentityPool: ""

# ════ Data ════════════════════════════════════════════════════════════════════

# @helm-gen:begin providers
googleSearch:
  enabled: false
  connection:
    apiEndpoint: "https://www.googleapis.com/customsearch/v1"
    # apiKey: <fromSecret or fromSecretProvider>
    # engineId: <set in cluster overlay when enabled>

braveSearch:
  enabled: false
  connection:
    apiEndpoint: "https://api.search.brave.com/res/v1/web/search"
    # apiKey: <fromSecret or fromSecretProvider>

perplexitySearch:
  enabled: false
  connection:
    apiEndpoint: "https://api.perplexity.ai/search"
    # apiKey: <fromSecret or fromSecretProvider>

bingAgent:
  enabled: false
  connection:
    azureIdentityCredentialType: default
    azureIdentityValidateTokenUrl: "https://management.azure.com/.default"
    usePrivateEndpointTransport: false
    cleanupOnStart: false
    # endpoint: <fromSecret or fromSecretProvider>
    # bingResourceConnectionString: <fromSecret or fromSecretProvider>
    # bingAgentModel: <fromSecret or fromSecretProvider>

vertexaiAgent:
  enabled: false
  connection:
    credentialType: workload_identity
    serviceAccountScopes:
      - "https://www.googleapis.com/auth/cloud-platform"
    # serviceAccountCredentials: <fromSecret or fromSecretProvider>

tavily:
  enabled: false
  connection:
    apiEndpoint: "https://api.tavily.com"
    # apiKey: <fromSecret or fromSecretProvider>

jina:
  enabled: false
  connection:
    deployment: global
    apiDomain: jina.ai
    # apiKey: <fromSecret or fromSecretProvider>

firecrawl:
  enabled: false
  connection:
    apiEndpoint: "https://api.firecrawl.dev"
    apiVersion: v2
    # apiKey: <fromSecret or fromSecretProvider>

httpClient:
  connection:
    proxyAuthMode: none
    proxyProtocol: http
    # proxyUsername: <fromSecret or fromSecretProvider>
    # proxyPassword: <fromSecret or fromSecretProvider>
  tuning:
    poolTimeoutSeconds: 30.0
    maxConnections: 100
    maxKeepaliveConnections: 20

urlSafety:
  enabled: true
  redirects:
    resolveRedirects: true
    maxRedirectHops: 10
    redirectTimeoutSeconds: 10.0
  network:
    allowedSchemes:
      - http
      - https
    localhostHosts:
      - localhost
      - localhost.localdomain
    metadataHosts:
      - 100.100.100.200
      - 169.254.169.254
      - 169.254.170.2
      - metadata.azure.internal
      - metadata.google.internal
    clusterLocalSuffix: .cluster.local
    serviceSuffix: .svc
# @helm-gen:end providers

# ════ Exposure ════════════════════════════════════════════════════════════════

# ── Service ───────────────────────────────────────────────────────────────────
service:
  port: 80

# ════ Operations ══════════════════════════════════════════════════════════════

# ── ServiceAccount ────────────────────────────────────────────────────────────
serviceAccount:
  enabled: true

# ── HorizontalPodAutoscaler ───────────────────────────────────────────────────
autoscaling:
  enabled: false

# ── PodDisruptionBudget ───────────────────────────────────────────────────────
pdb:
  maxUnavailable: 30%

# ── Grafana ───────────────────────────────────────────────────────────────────
# One ConfigMap (label grafana_dashboard: "1") is rendered per JSON file under
# files/grafana/dashboards/ and auto-imported by the cluster Grafana sidecar.
# %%PROMETHEUS_UID%% in the dashboard JSON is replaced with the datasource UID
# below; override per tenant in the cluster overlay if the UID differs.
grafana:
  dashboards:
    enabled: true
    folder: connectors
    replacements:
      '%%PROMETHEUS_UID%%': prometheus

# ── NetworkPolicy ─────────────────────────────────────────────────────────────
networkPolicy:
  enabled: false
  flavor: cilium
  enableDefaultDeny:
    ingress: true
    egress: true
