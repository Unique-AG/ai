# ════ Identity ════════════════════════════════════════════════════════════════
nameOverride: search-proxy
fullnameOverride: search-proxy
selectorComponentLabel: server

# ════ Compute ═════════════════════════════════════════════════════════════════

# ── Deployment ────────────────────────────────────────────────────────────────
env:
  LOG_LEVEL: info
  TIMEOUT: "120"
  WORKERS: "4"

image:
  pullPolicy: IfNotPresent
  registry: ghcr.io
  repository: unique-ag/ai/search-proxy
  tag: "2026.26.0" # x-release-please-version
  useDigest: false # not yet supported for out-of-tree charts

ports:
  application: 8080

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 384Mi

probes:
  enabled: true
  liveness:
    failureThreshold: 6
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5
  readiness:
    failureThreshold: 6
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5
  startup:
    failureThreshold: 30
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10

deployment:
  metadata:
    annotations:
      reloader.stakater.com/auto: "true"
  revisionHistoryLimit: 3

# ── Volumes ───────────────────────────────────────────────────────────────────
volumeMounts:
  - mountPath: /tmp
    name: tmp-volume

volumes:
  - emptyDir:
      sizeLimit: 5Gi
    name: tmp-volume

# ── WorkloadIdentity (GCP, Vertex AI) ─────────────────────────────────────────
workloadIdentity:
  gcp:
    enabled: false
    projectId: ""
    provider: ""
    serviceAccountEmail: ""
    workloadIdentityPool: ""

# ════ Data ════════════════════════════════════════════════════════════════════

# ── Google Search API ─────────────────────────────────────────────────────────
googleSearch:
  enabled: false
  connection:
    apiEndpoint: https://customsearch.googleapis.com/customsearch/v1
    # ── Required — set in your per-cluster overlay ───────────────────────────
    # engineId: <google-programmable-search-engine-id>
    # apiKey:
    #   # Use-case A — from an existing Kubernetes Secret:
    #   fromSecret:
    #     name: <secret-name>
    #     key: GOOGLE_SEARCH_API_KEY
    #   # Use-case B — from Azure Key Vault (SecretProviderClass):
    #   fromSecretProvider:
    #     vault: <vault-name>
    #     secretKey: GOOGLE-SEARCH-API-KEY

# ════ Exposure ════════════════════════════════════════════════════════════════

# ── Service ───────────────────────────────────────────────────────────────────
service:
  port: 80

# ════ Operations ══════════════════════════════════════════════════════════════

# ── ServiceAccount ────────────────────────────────────────────────────────────
serviceAccount:
  enabled: true

# ── HorizontalPodAutoscaler ───────────────────────────────────────────────────
autoscaling:
  enabled: false

# ── PodDisruptionBudget ───────────────────────────────────────────────────────
pdb:
  maxUnavailable: 30%

# ── NetworkPolicy ─────────────────────────────────────────────────────────────
networkPolicy:
  enabled: false
  flavor: cilium
  enableDefaultDeny:
    ingress: true
    egress: true
